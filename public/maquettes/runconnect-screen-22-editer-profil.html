<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunConnect — Maquette Modifier le profil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rc-blue: #2f6bff;
      --rc-navy: #1a2744;
      --rc-bg: #f2f2f7;
      --rc-muted: #8e8e93;
      --rc-card: #fff;
      --rc-line: rgba(60, 60, 67, 0.12);
      --shadow: 0 1px 2px rgba(0,0,0,.06), 0 10px 28px rgba(0,0,0,.09);
      --radius: 14px;
      --phone-w: 390px;
      --phone-r: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #e8ecf5 0%, #d4dbf0 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 12px 48px;
      color: var(--rc-navy);
    }
    .phone {
      width: var(--phone-w);
      background: #0a0a0f;
      border-radius: var(--phone-r);
      padding: 10px;
      box-shadow: 0 24px 64px rgba(0,0,0,.28);
    }
    .island { width: 120px; height: 32px; background: #000; border-radius: 20px; margin: 6px auto 10px; }
    .screen {
      background: var(--rc-bg);
      border-radius: calc(var(--phone-r) - 8px);
      min-height: 780px;
      overflow: hidden;
    }
    .header-wave {
      height: 120px;
      background: linear-gradient(115deg, #4da3ff 0%, #2f6bff 45%, #6b5cff 100%);
      position: relative;
    }
    .nav {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
    }
    .nav button {
      background: rgba(255,255,255,.22);
      border: none;
      color: #fff;
      font: inherit;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: default;
    }
    .nav .save { font-weight: 700; }
    .photo-wrap {
      display: flex;
      justify-content: center;
      margin-top: -44px;
      position: relative;
      z-index: 2;
    }
    .photo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid var(--rc-bg);
      background: linear-gradient(135deg, #64748b, #334155);
      box-shadow: var(--shadow);
    }
    .pencil {
      position: absolute;
      bottom: 0;
      right: calc(50% - 52px);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--rc-blue);
      border: 3px solid var(--rc-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }
    .content { padding: 20px 16px 24px; }
    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--rc-muted);
      margin: 14px 4px 6px;
    }
    .input, .textarea {
      width: 100%;
      background: var(--rc-card);
      border: 1px solid var(--rc-line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      color: var(--rc-navy);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .textarea {
      min-height: 88px;
      resize: none;
    }
    .card {
      background: var(--rc-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-top: 16px;
    }
    .row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-top: 1px solid var(--rc-line);
      font-size: 16px;
    }
    .row:first-child { border-top: none; }
    .row span:first-child { flex: 1; color: var(--rc-muted); }
    .row span:last-child { font-weight: 500; }
    .chev { color: #c7c7cc; margin-left: 8px; }
    .brand { text-align: center; margin-top: 24px; font-size: 11px; color: var(--rc-muted); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <div class="screen">
      <div class="header-wave">
        <div class="nav">
          <button type="button">Annuler</button>
          <span>Profil</span>
          <button type="button" class="save">Enregistrer</button>
        </div>
      </div>
      <div class="photo-wrap">
        <div class="photo"></div>
        <div class="pencil">✎</div>
      </div>
      <div class="content">
        <p class="field-label">Nom d’utilisateur</p>
        <input class="input" type="text" value="alex_run" readonly />

        <p class="field-label">Bio</p>
        <textarea class="textarea" readonly>Coureur passionné 🏃</textarea>

        <div class="card">
          <div class="row">
            <span>Ville</span>
            <span>Paris<span class="chev">›</span></span>
          </div>
          <div class="row">
            <span>Sports favoris</span>
            <span>Course, vélo<span class="chev">›</span></span>
          </div>
        </div>

        <p class="brand">RunConnect · maquette produit</p>
      </div>
    </div>
  </div>
</body>
</html>
