<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunConnect — Maquette Suivi participants</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rc-blue: #2f6bff;
      --rc-navy: #1a2744;
      --rc-bg: #f2f2f7;
      --rc-muted: #8e8e93;
      --rc-card: #fff;
      --rc-line: rgba(60, 60, 67, 0.12);
      --shadow: 0 1px 2px rgba(0,0,0,.06), 0 10px 28px rgba(0,0,0,.09);
      --radius: 14px;
      --phone-w: 390px;
      --phone-r: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #e8ecf5 0%, #d4dbf0 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 12px 48px;
      color: var(--rc-navy);
    }
    .phone {
      width: var(--phone-w);
      background: #0a0a0f;
      border-radius: var(--phone-r);
      padding: 10px;
      box-shadow: 0 24px 64px rgba(0,0,0,.28);
    }
    .island { width: 120px; height: 32px; background: #000; border-radius: 20px; margin: 6px auto 10px; }
    .screen {
      background: var(--rc-bg);
      border-radius: calc(var(--phone-r) - 8px);
      height: 780px;
      overflow: hidden;
      position: relative;
    }
    .map {
      height: 52%;
      background:
        linear-gradient(180deg, rgba(180,210,255,.35) 0%, transparent 40%),
        linear-gradient(90deg, #d4e4f7 0%, #c5ddd0 35%, #b8d4ea 70%, #cde8f0 100%);
      position: relative;
    }
    .map::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 35% 45%, rgba(47,107,255,.25) 0%, transparent 45%),
        radial-gradient(circle at 62% 55%, rgba(52,199,89,.2) 0%, transparent 35%);
    }
    .pin {
      position: absolute;
      left: 48%;
      top: 42%;
      width: 28px;
      height: 28px;
      background: var(--rc-blue);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid #fff;
      box-shadow: 0 6px 16px rgba(47,107,255,.4);
      z-index: 2;
    }
    .avatar-pin {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid #fff;
      background: linear-gradient(135deg, #94a3b8, #64748b);
      box-shadow: 0 8px 20px rgba(0,0,0,.2);
      z-index: 2;
    }
    .avatar-pin.a { left: 22%; top: 38%; }
    .avatar-pin.b { left: 68%; top: 48%; background: linear-gradient(135deg, #c4b5fd, #8b5cf6); }
    .dot-live {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 12px;
      height: 12px;
      background: #34c759;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .dot-idle {
      background: #ff9500;
    }
    .topbar {
      position: absolute;
      top: 10px;
      left: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 3;
    }
    .circle-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--rc-blue);
      box-shadow: var(--shadow);
    }
    .title-chip {
      flex: 1;
      text-align: center;
      background: rgba(255,255,255,.92);
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--rc-navy);
      box-shadow: var(--shadow);
    }
    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48%;
      background: var(--rc-bg);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -8px 32px rgba(0,0,0,.12);
      padding: 10px 0 16px;
    }
    .grab {
      width: 40px;
      height: 5px;
      background: #d1d1d6;
      border-radius: 3px;
      margin: 4px auto 12px;
    }
    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 10px;
    }
    .sheet-head h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .live-badge {
      background: #e7f7ec;
      color: #1a7f37;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
    }
    .search {
      margin: 0 16px 12px;
      background: #e5e5ea;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      color: var(--rc-muted);
    }
    .list {
      padding: 0 16px;
      max-height: 280px;
      overflow: hidden;
    }
    .person {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--rc-card);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .av {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #94a3b8, #475569);
      position: relative;
    }
    .av.p2 { background: linear-gradient(135deg, #c4b5fd, #7c3aed); }
    .av.p3 { background: linear-gradient(135deg, #fcd34d, #f59e0b); }
    .pb { flex: 1; min-width: 0; }
    .pn { font-weight: 600; font-size: 16px; }
    .ps { font-size: 13px; color: var(--rc-muted); margin-top: 2px; }
    .follow {
      font-size: 14px;
      font-weight: 600;
      color: var(--rc-blue);
      border: 1.5px solid var(--rc-blue);
      padding: 6px 14px;
      border-radius: 10px;
      background: #fff;
    }
    .follow.filled {
      background: var(--rc-blue);
      color: #fff;
    }
    .brand {
      text-align: center;
      font-size: 10px;
      color: var(--rc-muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <div class="screen">
      <div class="map">
        <div class="topbar">
          <div class="circle-btn">‹</div>
          <div class="title-chip">SUIVI EN DIRECT</div>
          <div class="circle-btn">⤢</div>
        </div>
        <div class="pin"></div>
        <div class="avatar-pin a"><span class="dot-live"></span></div>
        <div class="avatar-pin b"><span class="dot-live dot-idle"></span></div>
      </div>
      <div class="sheet">
        <div class="grab"></div>
        <div class="sheet-head">
          <h2>Participants</h2>
          <span class="live-badge">3 en ligne</span>
        </div>
        <div class="search">⌕ Rechercher…</div>
        <div class="list">
          <div class="person">
            <div class="av"></div>
            <div class="pb">
              <div class="pn">Thomas M.</div>
              <div class="ps">En chemin — à 320 m · Actif</div>
            </div>
            <span class="follow filled">Suivi</span>
          </div>
          <div class="person">
            <div class="av p2"></div>
            <div class="pb">
              <div class="pn">Léa K.</div>
              <div class="ps">En route vers le point de rendez-vous</div>
            </div>
            <span class="follow">Suivre</span>
          </div>
          <div class="person">
            <div class="av p3"></div>
            <div class="pb">
              <div class="pn">Marc D.</div>
              <div class="ps">Position figée · Pas en direct</div>
            </div>
            <span class="follow">Suivre</span>
          </div>
        </div>
        <p class="brand">RunConnect · maquette produit</p>
      </div>
    </div>
  </div>
</body>
</html>
