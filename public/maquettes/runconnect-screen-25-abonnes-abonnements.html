<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunConnect — Maquette Abonnés &amp; abonnements</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rc-blue: #2f6bff;
      --rc-navy: #1a2744;
      --rc-bg: #f2f2f7;
      --rc-muted: #8e8e93;
      --rc-card: #fff;
      --rc-line: rgba(60, 60, 67, 0.12);
      --shadow: 0 1px 2px rgba(0,0,0,.06), 0 10px 28px rgba(0,0,0,.09);
      --radius: 14px;
      --phone-w: 390px;
      --phone-r: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #e8ecf5 0%, #d4dbf0 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 12px 48px;
      color: var(--rc-navy);
    }
    .phone {
      width: var(--phone-w);
      background: #0a0a0f;
      border-radius: var(--phone-r);
      padding: 10px;
      box-shadow: 0 24px 64px rgba(0,0,0,.28);
    }
    .island { width: 120px; height: 32px; background: #000; border-radius: 20px; margin: 6px auto 10px; }
    .screen {
      background: var(--rc-bg);
      border-radius: calc(var(--phone-r) - 8px);
      min-height: 780px;
      overflow: hidden;
    }
    .nav {
      background: var(--rc-card);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--rc-line);
    }
    .nav h1 { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
    .x {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--rc-muted);
      font-size: 18px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 12px 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      flex: 1;
      min-width: 0;
      text-align: center;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--rc-muted);
      background: transparent;
      white-space: nowrap;
    }
    .tab.active {
      background: var(--rc-card);
      color: var(--rc-navy);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .tab .n { color: var(--rc-muted); font-weight: 500; }
    .tab.active .n { color: var(--rc-blue); }
    .search {
      margin: 0 16px 12px;
      background: #e5e5ea;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--rc-muted);
    }
    .list { padding: 0 16px 24px; }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--rc-card);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .av {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .av.a { background: linear-gradient(135deg, #fca5a5, #dc2626); }
    .av.b { background: linear-gradient(135deg, #86efac, #16a34a); }
    .av.c { background: linear-gradient(135deg, #93c5fd, #2563eb); }
    .body { flex: 1; min-width: 0; }
    .name { font-weight: 600; font-size: 16px; }
    .sub { font-size: 13px; color: var(--rc-muted); margin-top: 2px; }
    .sub .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #34c759;
      border-radius: 50%;
      margin-right: 4px;
    }
    .action {
      font-size: 14px;
      font-weight: 600;
      color: var(--rc-blue);
      padding: 8px 12px;
      border-radius: 8px;
      background: #e8f0ff;
      flex-shrink: 0;
    }
    .action.outline {
      background: transparent;
      border: 1.5px solid var(--rc-blue);
    }
    .brand { text-align: center; font-size: 11px; color: var(--rc-muted); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <div class="screen">
      <div class="nav">
        <span style="width:32px"></span>
        <h1>Léa Martin</h1>
        <div class="x">×</div>
      </div>
      <div class="tabs">
        <div class="tab active">Abonnés <span class="n">124</span></div>
        <div class="tab">Abonnements <span class="n">89</span></div>
        <div class="tab">Demandes <span class="n">2</span></div>
      </div>
      <div class="search">⌕ Rechercher</div>
      <div class="list">
        <div class="row">
          <div class="av a"></div>
          <div class="body">
            <div class="name">Thomas M.</div>
            <div class="sub"><span class="dot"></span>En ligne · Ami</div>
          </div>
          <span class="action outline">Message</span>
        </div>
        <div class="row">
          <div class="av b"></div>
          <div class="body">
            <div class="name">Nina K.</div>
            <div class="sub">Club Run Paris</div>
          </div>
          <span class="action">Suivi</span>
        </div>
        <div class="row">
          <div class="av c"></div>
          <div class="body">
            <div class="name">Julien P.</div>
            <div class="sub">Vous suit · Semi 1:35</div>
          </div>
          <span class="action outline">Suivre aussi</span>
        </div>
      </div>
      <p class="brand">RunConnect · liste abonnés (profil autre / soi)</p>
    </div>
  </div>
</body>
</html>
