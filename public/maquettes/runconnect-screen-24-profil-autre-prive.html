<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunConnect — Maquette Profil autre (compte privé)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rc-blue: #2f6bff;
      --rc-navy: #1a2744;
      --rc-bg: #f2f2f7;
      --rc-muted: #8e8e93;
      --rc-card: #fff;
      --rc-line: rgba(60, 60, 67, 0.12);
      --shadow: 0 1px 2px rgba(0,0,0,.06), 0 10px 28px rgba(0,0,0,.09);
      --radius: 14px;
      --phone-w: 390px;
      --phone-r: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #e8ecf5 0%, #d4dbf0 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 12px 48px;
      color: var(--rc-navy);
    }
    .phone {
      width: var(--phone-w);
      background: #0a0a0f;
      border-radius: var(--phone-r);
      padding: 10px;
      box-shadow: 0 24px 64px rgba(0,0,0,.28);
    }
    .island { width: 120px; height: 32px; background: #000; border-radius: 20px; margin: 6px auto 10px; }
    .screen {
      background: var(--rc-bg);
      border-radius: calc(var(--phone-r) - 8px);
      min-height: 780px;
      overflow: hidden;
    }
    .cover {
      height: 120px;
      background: linear-gradient(145deg, #cbd5e1 0%, #94a3b8 100%);
      position: relative;
    }
    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--rc-bg) 0%, transparent 60%);
    }
    .back {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--rc-blue);
      font-size: 22px;
      box-shadow: var(--shadow);
    }
    .identity {
      position: relative;
      padding: 0 16px;
      margin-top: -48px;
      z-index: 1;
      display: flex;
      gap: 14px;
      align-items: flex-end;
    }
    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 4px solid var(--rc-bg);
      background: linear-gradient(145deg, #64748b, #334155);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    .id-text { flex: 1; min-width: 0; padding-bottom: 6px; }
    .name { font-size: 20px; font-weight: 700; }
    .handle { font-size: 15px; color: var(--rc-muted); margin-top: 2px; }
    .private-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--rc-muted);
      background: #e5e5ea;
      padding: 5px 10px;
      border-radius: 8px;
    }
    .content { padding: 16px; }
    .actions { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
    }
    .btn-muted {
      background: #e5e5ea;
      color: var(--rc-muted);
    }
    .btn-primary {
      background: var(--rc-blue);
      color: #fff;
    }
    .lock-card {
      background: var(--rc-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 20px;
      text-align: center;
      border: 1px dashed var(--rc-line);
    }
    .lock-ico {
      font-size: 36px;
      margin-bottom: 12px;
    }
    .lock-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .lock-card p {
      font-size: 14px;
      color: var(--rc-muted);
      line-height: 1.45;
    }
    .stats-blur {
      margin-top: 16px;
      filter: blur(6px);
      opacity: .45;
      pointer-events: none;
      user-select: none;
    }
    .stat-row {
      display: flex;
      justify-content: space-around;
      background: var(--rc-card);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-row div { text-align: center; }
    .stat-row strong { display: block; font-size: 18px; }
    .stat-row span { font-size: 11px; color: var(--rc-muted); }
    .brand { text-align: center; margin-top: 24px; font-size: 11px; color: var(--rc-muted); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <div class="screen">
      <div class="cover">
        <div class="back">‹</div>
      </div>
      <div class="identity">
        <div class="avatar"></div>
        <div class="id-text">
          <h1 class="name">Marc D.</h1>
          <p class="handle">@marc_run_privé</p>
          <div class="private-badge">🔒 Compte privé</div>
        </div>
      </div>
      <div class="content">
        <div class="actions">
          <div class="btn btn-muted" style="flex:1">En attente</div>
        </div>
        <div class="lock-card">
          <div class="lock-ico">🔐</div>
          <h2>Contenu restreint</h2>
          <p>Suivez ce compte pour voir la bio, les records et l’activité. Une invitation peut être nécessaire si le compte est privé.</p>
        </div>
        <div class="stats-blur">
          <div class="stat-row">
            <div><strong>—</strong><span>Abonnés</span></div>
            <div><strong>—</strong><span>Séances</span></div>
            <div><strong>—</strong><span>Records</span></div>
          </div>
        </div>
        <p class="brand">RunConnect · profil autre · compte privé</p>
      </div>
    </div>
  </div>
</body>
</html>
