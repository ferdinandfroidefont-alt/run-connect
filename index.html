<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    
    <title>RunConnect | Réseau social sportif</title>
    <meta name="description" content="Rejoignez la communauté sportive RunConnect. Organisez des sessions, suivez vos amis, participez aux classements et progressez ensemble !">
    <meta name="author" content="RunConnect" />

    <!-- Google Fonts Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/brand/runconnect-loading-splash.svg">

    <meta property="og:title" content="RunConnect | Réseau social sportif" />
    <meta property="og:description" content="Organisez des séances, suivez vos amis, classements et progression — communauté sportive RunConnect." />
    <meta property="og:type" content="website" />
    <!-- Remplace par une image absolue HTTPS (1200×630) hébergée sur ton domaine pour le partage réseaux sociaux -->
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RunConnect | Réseau social sportif" />
    <meta name="twitter:description" content="Organisez des séances, suivez vos amis, classements et progression." />
    <meta name="twitter:image" content="/favicon.png" />

    <!-- Premier rendu : couleur de secours derrière le visuel de chargement ; le thème met à jour ensuite -->
    <meta name="theme-color" content="#0066CC" />
    <!-- default = barre d’état opaque claire ; le thème sombre met « black » via JS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Anti-flash thème (next-themes / runconnect-ui-theme). Anciens modes accent / Deep Blue retirés : nettoyage localStorage + data-* -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <script>
      (function () {
        try {
          localStorage.removeItem('runconnect-visual');
          document.documentElement.removeAttribute('data-visual');
          localStorage.removeItem('runconnect-accent');
          document.documentElement.removeAttribute('data-accent');
        } catch (e) {}
        try {
          var key = 'runconnect-ui-theme';
          var t = localStorage.getItem(key);
          var dark = false;
          if (t === 'dark') dark = true;
          else if (t === 'light') dark = false;
          else dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
      document.addEventListener('DOMContentLoaded', function () {
        try {
          if (document.documentElement.classList.contains('dark') && document.body && !document.getElementById('root')?.matches(':empty')) {
            var d = 'hsl(240 5% 11%)';
            document.documentElement.style.backgroundColor = d;
            document.body.style.backgroundColor = d;
          }
        } catch (e) {}
      });
    </script>
  </head>

  <body style="background:#0066CC url('/brand/runconnect-loading-splash.svg') center / cover no-repeat;margin:0">
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      html,
      #root {
        background: #0066CC url('/brand/runconnect-loading-splash.svg') center / cover no-repeat;
      }

      .boot-splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        min-height: 100dvh;
        width: 100%;
        overflow: hidden;
        background: #0066CC url('/brand/runconnect-loading-splash.svg') center / cover no-repeat;
      }

      .boot-splash__media {
        pointer-events: none;
        position: absolute;
        inset: 0;
        display: block;
        height: 100%;
        width: 100%;
        user-select: none;
        object-fit: cover;
        object-position: center;
      }
    </style>
    <div id="root">
      <div class="boot-splash" role="status" aria-busy="true" aria-live="polite">
        <video
          class="boot-splash__media"
          src="/brand/runconnect-loading.mp4"
          poster="/brand/runconnect-loading-splash.svg"
          autoplay
          loop
          muted
          playsinline
          preload="auto"
          disablepictureinpicture
          aria-hidden="true"
        ></video>
      </div>
    </div>
    
    <script>
      window.__fcmTokenReceived = false;
      window.__fcmTokenBuffer = null;
      window.addEventListener('fcmTokenReady', function(e) {
        window.__fcmTokenBuffer = e.detail?.token;
        window.__fcmTokenPlatform = e.detail?.platform || 'unknown';
      });
    </script>
    
    <!-- Pas de window.scrollTo sur focus : ça combat le scroll interne des pages et fait bouger la barre titre (voir IosFixedPageHeaderShell). -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
