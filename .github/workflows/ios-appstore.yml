name: Build & Upload iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (auto-increment if empty)'
        required: false
        default: ''

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build web app
        run: npm run build

      - name: 📱 Add iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: 🔥 Add GoogleService-Info.plist for Firebase
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO" ]; then
            echo "$GOOGLE_SERVICE_INFO" | base64 --decode > ios/App/App/GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist added"
          else
            echo "⚠️ IOS_GOOGLE_SERVICE_INFO_BASE64 secret not set, skipping"
          fi

      - name: 📲 Configure Push Notification entitlements
        run: |
          cat > ios/App/App/App.entitlements << 'ENTITLEMENTS_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          ENTITLEMENTS_EOF
          echo "✅ Push entitlements configured"

      - name: 🔥 Add Firebase Messaging pod
        run: |
          cd ios/App
          if ! grep -q "Firebase/Messaging" Podfile; then
            sed -i '' '/target .App. do/a\
              pod '\''Firebase\/Messaging'\''
            ' Podfile
            echo "✅ Firebase/Messaging pod added"
          else
            echo "ℹ️ Firebase/Messaging pod already present"
          fi

      - name: 🔥 Configure AppDelegate for Firebase + APNs + FCM WebView bridge
        run: |
          DELEGATE="ios/App/App/AppDelegate.swift"
          if [ -f "$DELEGATE" ]; then
            if ! grep -q "FirebaseCore" "$DELEGATE"; then
              # Add imports (include Capacitor for CAPBridgeViewController)
              sed -i '' 's/import UIKit/import UIKit\nimport FirebaseCore\nimport FirebaseMessaging\nimport Capacitor/' "$DELEGATE"
              
              # Add MessagingDelegate protocol conformance
              sed -i '' 's/class AppDelegate: UIResponder, UIApplicationDelegate/class AppDelegate: UIResponder, UIApplicationDelegate, MessagingDelegate/' "$DELEGATE"
              
              # Add FirebaseApp.configure() + Messaging delegate
              sed -i '' '/super.application.*didFinishLaunchingWithOptions/a\
                  FirebaseApp.configure()\
                  Messaging.messaging().delegate = self
              ' "$DELEGATE"
              
              # Inject APNs + FCM methods with WebView JS bridge
              python3 -c "
with open('ios/App/App/AppDelegate.swift', 'r') as f:
    content = f.read()

apns_methods = '''
    // MARK: - APNs Token Registration
    func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
        let hexToken = deviceToken.map { String(format: \"%02x\", \$0) }.joined()
        print(\"[PUSH] APNs deviceToken received (hex): \\(hexToken.prefix(20))...\")

        // 1. Post raw Data to Capacitor (standard flow — Capacitor converts to hex for registration event)
        NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)

        // 2. Give APNs token to Firebase for FCM exchange
        Messaging.messaging().apnsToken = deviceToken
        print(\"[PUSH] APNs token given to Firebase Messaging\")

        // 3. Fetch FCM token and inject into WebView
        Messaging.messaging().token(completion: { [weak self] fcmToken, error in
            if let error = error {
                print(\"[PUSH] FCM token fetch error: \\(error.localizedDescription)\")
                return
            }
            guard let fcmToken = fcmToken else {
                print(\"[PUSH] FCM token is nil after fetch\")
                return
            }
            print(\"[PUSH] FCM token received: \\(fcmToken.prefix(30))...\")
            self?.injectFCMTokenIntoWebView(fcmToken)
        })
    }

    func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {
        print(\"[PUSH] APNs registration FAILED: \\(error.localizedDescription)\")
        NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
    }

    // MARK: - MessagingDelegate (FCM token refresh)
    func messaging(_ messaging: Messaging, didReceiveRegistrationToken fcmToken: String?) {
        guard let fcmToken = fcmToken else { return }
        print(\"[PUSH] FCM token refreshed: \\(fcmToken.prefix(30))...\")
        injectFCMTokenIntoWebView(fcmToken)
    }

    // MARK: - FCM Token WebView Bridge
    private func injectFCMTokenIntoWebView(_ token: String) {
        DispatchQueue.main.async {
            guard let window = UIApplication.shared.windows.first,
                  let rootVC = window.rootViewController else {
                print(\"[PUSH] No root view controller found\")
                return
            }
            // Walk the VC hierarchy to find CAPBridgeViewController
            var vc: UIViewController? = rootVC
            while let current = vc {
                if let bridge = current as? CAPBridgeViewController {
                    let escapedToken = token.replacingOccurrences(of: \"'\", with: \"\\\\\\'\" )
                    let js = \"window.fcmToken='\\(escapedToken)';window.dispatchEvent(new CustomEvent('fcmTokenReady',{detail:{token:'\\(escapedToken)',platform:'ios'}}));console.log('[PUSH] fcmTokenReady dispatched from native, token length:',\\(token.count));\"
                    bridge.webView?.evaluateJavaScript(js) { result, error in
                        if let error = error {
                            print(\"[PUSH] JS injection error: \\(error.localizedDescription)\")
                        } else {
                            print(\"[PUSH] FCM token injected into WebView successfully\")
                        }
                    }
                    return
                }
                // Try presented or child VCs
                if let presented = current.presentedViewController {
                    vc = presented
                } else if let first = current.children.first {
                    vc = first
                } else {
                    break
                }
            }
            print(\"[PUSH] CAPBridgeViewController not found in VC hierarchy, retrying in 2s...\")
            // Retry after 2s (WebView may not be ready yet at app launch)
            DispatchQueue.main.asyncAfter(deadline: .now() + 2.0) {
                guard let window = UIApplication.shared.windows.first,
                      let rootVC = window.rootViewController else { return }
                var retryVC: UIViewController? = rootVC
                while let current = retryVC {
                    if let bridge = current as? CAPBridgeViewController {
                        let escapedToken = token.replacingOccurrences(of: \"'\", with: \"\\\\\\'\" )
                        let js = \"window.fcmToken='\\(escapedToken)';window.dispatchEvent(new CustomEvent('fcmTokenReady',{detail:{token:'\\(escapedToken)',platform:'ios'}}));console.log('[PUSH] fcmTokenReady dispatched (retry)');\"
                        bridge.webView?.evaluateJavaScript(js)
                        print(\"[PUSH] FCM token injected on retry\")
                        return
                    }
                    if let presented = current.presentedViewController {
                        retryVC = presented
                    } else if let first = current.children.first {
                        retryVC = first
                    } else {
                        break
                    }
                }
                print(\"[PUSH] CAPBridgeViewController still not found after retry\")
            }
        }
    }
'''

