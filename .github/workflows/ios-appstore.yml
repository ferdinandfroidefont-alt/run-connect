name: Build & Upload iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (auto-increment if empty)'
        required: false
        default: ''

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build web app
        run: npm run build

      - name: 📱 Add iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: 🔥 Add GoogleService-Info.plist for Firebase
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO" ]; then
            echo "❌ IOS_GOOGLE_SERVICE_INFO_BASE64 secret NOT set — Firebase will NOT work!"
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO" | base64 --decode > ios/App/App/GoogleService-Info.plist
          echo "✅ GoogleService-Info.plist added"
          echo "📋 Plist size: $(wc -c < ios/App/App/GoogleService-Info.plist) bytes"

      # 🔍 AJOUT : vérifier que le plist Firebase est correct
      - name: 🔍 Verify decoded Firebase plist
        run: |
          echo "=== Firebase plist check ==="
          /usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" ios/App/App/GoogleService-Info.plist || true
          /usr/libexec/PlistBuddy -c "Print :GOOGLE_APP_ID" ios/App/App/GoogleService-Info.plist || true
          /usr/libexec/PlistBuddy -c "Print :PROJECT_ID" ios/App/App/GoogleService-Info.plist || true
          echo "=== end ==="

      - name: 📲 Configure Push Notification entitlements
        run: |
          cat > ios/App/App/App.entitlements << 'ENTITLEMENTS_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          ENTITLEMENTS_EOF
          echo "✅ Push entitlements configured"

      - name: 🔥 Add Firebase Messaging pod
        run: |
          cd ios/App
          if ! grep -q "Firebase/Messaging" Podfile; then
            sed -i '' '/target .App. do/a\
              pod '\''Firebase\/Messaging'\''
            ' Podfile
            echo "✅ Firebase/Messaging pod added"
          else
            echo "ℹ️ Firebase/Messaging pod already present"
          fi

      - name: 🔥 Configure AppDelegate for Firebase + APNs + FCM WebView bridge
        run: bash scripts/configure_ios_push.sh

      - name: 📋 Verify AppDelegate injection (CI proof)
        run: |
          echo "=== AppDelegate.swift push methods ==="
          grep -n 'PUSH\|fcmToken\|apnsToken\|injectFCM\|didRegister\|MessagingDelegate\|traceId' ios/App/App/AppDelegate.swift || echo "⚠️ No push markers found"
          echo "=== end ==="

      - name: 🔥 Enable Firebase APNs proxy in Info.plist
        run: |
          INFO_PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :FirebaseAppDelegateProxyEnabled bool false" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :FirebaseAppDelegateProxyEnabled false" "$INFO_PLIST"
          echo "✅ FirebaseAppDelegateProxyEnabled set to false (custom AppDelegate handles callbacks)"

      - name: 🔢 Set build number
        run: |
          BUILD_NUMBER="${{ github.run_number }}"
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          fi
          echo "📋 Setting build number to: $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "ios/App/App/Info.plist"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
            ios/App/App.xcodeproj/project.pbxproj
          echo "✅ Build number set to $BUILD_NUMBER"

      - name: 🔧 Update Bundle Identifier
        run: |
          sed -i '' 's/app.lovable.[^"]*\|io\.ionic\.starter/com.ferdi.runconnect/g' \
            ios/App/App.xcodeproj/project.pbxproj

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📦 Install xcodeproj gem
        run: gem install xcodeproj

      - name: 🔐 Setup signing keychain
        id: keychain
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" "$KEYCHAIN_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "keychain_path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT

      - name: 📦 Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: 🏗️ Build iOS archive
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"

      # 🔍 AJOUT : vérifier que Firebase est dans l'app finale
      - name: 🔍 Verify GoogleService-Info.plist inside built app
        run: |
          APP_PLIST="$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app/GoogleService-Info.plist"
          if [ ! -f "$APP_PLIST" ]; then
            echo "❌ GoogleService-Info.plist NOT found in built app bundle"
            exit 1
          fi
          echo "✅ GoogleService-Info.plist found in built app bundle"
          /usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Print :GOOGLE_APP_ID" "$APP_PLIST" || true
          /usr/libexec/PlistBuddy -c "Print :PROJECT_ID" "$APP_PLIST" || true