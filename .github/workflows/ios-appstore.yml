name: Build & Upload iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (auto-increment if empty)'
        required: false
        default: ''

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build web app
        run: npm run build

      - name: 📱 Add iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: 🔧 Update Bundle Identifier
        run: |
          sed -i '' 's/app.lovable.[^"]*\|io\.ionic\.starter/com.ferdi.runconnect/g' \
            ios/App/App.xcodeproj/project.pbxproj

      # 🔐 AJOUT DES PERMISSIONS IOS (IMPORTANT)
      - name: 🧾 Add iOS privacy usage strings (Info.plist)
        run: |
          PLIST="ios/App/App/Info.plist"

          add_or_set () {
            KEY="$1"
            VALUE="$2"
            /usr/libexec/PlistBuddy -c "Print :$KEY" "$PLIST" >/dev/null 2>&1 && \
              /usr/libexec/PlistBuddy -c "Set :$KEY $VALUE" "$PLIST" || \
              /usr/libexec/PlistBuddy -c "Add :$KEY string $VALUE" "$PLIST"
          }

          # Contacts
          add_or_set "NSContactsUsageDescription" "\"RunConnect a besoin d’accéder à vos contacts pour vous permettre d’inviter des amis à rejoindre vos séances.\""

          # Localisation
          add_or_set "NSLocationWhenInUseUsageDescription" "\"RunConnect utilise votre localisation pour afficher votre position sur la carte et proposer des séances près de vous.\""
          add_or_set "NSLocationAlwaysAndWhenInUseUsageDescription" "\"RunConnect peut utiliser votre localisation pour améliorer l’expérience de la carte et le suivi des séances.\""
          add_or_set "NSLocationAlwaysUsageDescription" "\"RunConnect peut utiliser votre localisation pour améliorer l’expérience de la carte et le suivi des séances.\""

          # Caméra
          add_or_set "NSCameraUsageDescription" "\"RunConnect a besoin d’accéder à la caméra pour prendre une photo de profil ou partager des photos de séance.\""

          # Photos
          add_or_set "NSPhotoLibraryUsageDescription" "\"RunConnect a besoin d’accéder à vos photos pour choisir une photo de profil ou partager des images.\""
          add_or_set "NSPhotoLibraryAddUsageDescription" "\"RunConnect peut enregistrer des images dans votre bibliothèque.\""

          # Micro
          add_or_set "NSMicrophoneUsageDescription" "\"RunConnect a besoin du micro uniquement si vous utilisez une fonctionnalité audio.\""

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📦 Install xcodeproj gem
        run: gem install xcodeproj

      - name: 🔐 Setup signing keychain
        id: keychain
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "keychain_path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT

      - name: 🔧 Configure App signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.keychain.outputs.profile_uuid }}
        run: |
          cd ios/App
          ruby << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          target.build_configurations.each do |c|
            c.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            c.build_settings['DEVELOPMENT_TEAM'] = ENV['APPLE_TEAM_ID']
            c.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            c.build_settings['PROVISIONING_PROFILE'] = ENV['PROFILE_UUID']
          end
          project.save
          RUBY

      - name: 📦 Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: 🏗️ Build iOS archive
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive

      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.keychain.outputs.profile_uuid }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ferdi.runconnect</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: 🚀 Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ runner.temp }}/export/*.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_API_KEY_P8 }}

      - name: 🧹 Cleanup
        if: always()
        run: |
          security delete-keychain "${{ steps.keychain.outputs.keychain_path }}" || true