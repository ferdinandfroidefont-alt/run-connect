            }
        })
    }

    func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {
        NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
    }

    func messaging(_ messaging: Messaging, didReceiveRegistrationToken fcmToken: String?) {
        guard let fcmToken = fcmToken else { return }
        print(\"[PUSH] FCM token refreshed\")
        injectFCMTokenIntoWebView(fcmToken)
    }

    private func injectFCMTokenIntoWebView(_ token: String) {
        DispatchQueue.main.async {
            guard let window = UIApplication.shared.windows.first,
                  let rootVC = window.rootViewController else { return }
            var vc: UIViewController? = rootVC
            while let current = vc {
                if let bridge = current as? CAPBridgeViewController {
                    let js = \"window.fcmToken='\\(token)';window.dispatchEvent(new CustomEvent('fcmTokenReady',{detail:{token:'\\(token)',platform:'ios'}}));\"
                    bridge.webView?.evaluateJavaScript(js)
                    return
                }
                if let p = current.presentedViewController { vc = p }
                else if let c = current.children.first { vc = c }
                else { break }
            }
            DispatchQueue.main.asyncAfter(deadline: .now() + 2.0) {
                guard let w = UIApplication.shared.windows.first, let r = w.rootViewController else { return }
                var v: UIViewController? = r
                while let c = v {
                    if let b = c as? CAPBridgeViewController {
                        let js = \"window.fcmToken='\\(token)';window.dispatchEvent(new CustomEvent('fcmTokenReady',{detail:{token:'\\(token)',platform:'ios'}}));\"
                        b.webView?.evaluateJavaScript(js)
                        return
                    }
                    if let p = c.presentedViewController { v = p }
                    else if let f = c.children.first { v = f }
                    else { break }
                }
            }
        }
    }
