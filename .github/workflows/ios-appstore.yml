name: Build & Upload iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (auto-increment if empty)'
        required: false
        default: ''

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # sharp (@capacitor/assets) tente par défaut de télécharger libvips depuis GitHub → 502 fréquent côté CI.
      # Avec libvips fourni par Homebrew, sharp compile contre la lib système et n’a plus besoin de ce téléchargement.
      - name: 🍺 Install libvips for sharp
        run: |
          brew install vips
          pkg-config --modversion vips-cpp

      # Retries npm conservés pour d’autres aléas réseau ; l’étape Homebrew ci-dessus évite surtout les 502 sharp-libvips.
      - name: 📦 Install dependencies
        env:
          npm_config_fetch_retries: '5'
          npm_config_fetch_retry_mintimeout: '20000'
          npm_config_fetch_retry_maxtimeout: '120000'
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if npm ci --legacy-peer-deps; then
              echo "✅ npm ci succeeded (attempt $attempt)"
              exit 0
            fi
            echo "::warning::npm ci failed (attempt $attempt/5). Retrying in 30s — often transient 502 from GitHub (sharp/libvips)…"
            sleep 30
          done
          echo "::error::npm ci failed after 5 attempts"
          exit 1

      - name: 🔨 Build web app
        run: npm run build

      - name: 📱 Add iOS platform
        run: |
          if [ -d "ios/App" ]; then
            echo "ℹ️ iOS platform already present — skipping cap add ios"
          else
            npx cap add ios
          fi
          npx cap sync ios

      - name: 🔥 Add GoogleService-Info.plist for Firebase
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO" ]; then
            echo "❌ IOS_GOOGLE_SERVICE_INFO_BASE64 secret NOT set — Firebase will NOT work!"
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO" | base64 --decode > ios/App/App/GoogleService-Info.plist
          echo "✅ GoogleService-Info.plist added"
          echo "📋 Plist size: $(wc -c < ios/App/App/GoogleService-Info.plist) bytes"
          # Validate BUNDLE_ID matches expected value
          PLIST_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" ios/App/App/GoogleService-Info.plist)
          if [ "$PLIST_BUNDLE_ID" != "com.ferdi.runconnect" ]; then
            echo "❌ FATAL: GoogleService-Info.plist BUNDLE_ID='$PLIST_BUNDLE_ID' ≠ 'com.ferdi.runconnect'"
            exit 1
          fi
          echo "✅ GoogleService-Info.plist BUNDLE_ID verified: $PLIST_BUNDLE_ID"

      - name: 📲 Configure Push Notification entitlements
        run: |
          cat > ios/App/App/App.entitlements << 'ENTITLEMENTS_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          ENTITLEMENTS_EOF
          echo "✅ Push entitlements configured"

      - name: 🔥 Add Firebase Messaging pod
        run: |
          cd ios/App
          if grep -qE "Firebase(Messaging|Core)|Firebase/Messaging" Podfile; then
            echo "ℹ️ Firebase pods already in Podfile (Messaging / Core)"
          else
            sed -i '' '/target .App. do/a\
              pod '\''Firebase\/Messaging'\''
            ' Podfile
            echo "✅ Firebase/Messaging pod added (legacy Podfile)"
          fi

      - name: 🔥 Configure AppDelegate for Firebase + APNs + FCM WebView bridge
        run: |
          if grep -q 'RUNCONNECT_IOS_PUSH_COMPLETE' ios/App/App/AppDelegate.swift; then
            echo "ℹ️ AppDelegate already includes FCM → WebView bridge (RUNCONNECT_IOS_PUSH_COMPLETE) — skipping configure_ios_push.sh"
          else
            bash scripts/configure_ios_push.sh
          fi

      - name: 📋 Verify AppDelegate injection (CI proof)
        run: |
          echo "=== AppDelegate.swift push methods ==="
          grep -n 'RUNCONNECT_IOS_PUSH_COMPLETE\|PUSH\]\[IOS\]\|apnsToken\|injectFCMTokenIntoWebView\|fcmTokenReady\|MessagingDelegate' ios/App/App/AppDelegate.swift || echo "⚠️ No push markers found"
          echo "=== end ==="

      - name: 🔥 Enable Firebase APNs proxy in Info.plist
        run: |
          INFO_PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :FirebaseAppDelegateProxyEnabled bool false" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :FirebaseAppDelegateProxyEnabled false" "$INFO_PLIST"
          echo "✅ FirebaseAppDelegateProxyEnabled set to false (custom AppDelegate handles callbacks)"

      - name: 🔢 Set build number
        run: |
          # Use GitHub run number as build number (auto-increments with each workflow run)
          BUILD_NUMBER="${{ github.run_number }}"
          
          # If user provided a specific build number, use that instead
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          fi
          
          echo "📋 Setting build number to: $BUILD_NUMBER"
          
          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "ios/App/App/Info.plist"
          
          # Also update project.pbxproj for consistency
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
            ios/App/App.xcodeproj/project.pbxproj
          
          echo "✅ Build number set to $BUILD_NUMBER"

      - name: 📝 Configure Info.plist permissions
        run: |
          INFO_PLIST="ios/App/App/Info.plist"
          
          # Contacts
          /usr/libexec/PlistBuddy -c "Add :NSContactsUsageDescription string 'RunConnect a besoin d'\''accéder à vos contacts pour trouver vos amis qui utilisent l'\''application et les inviter à rejoindre vos sessions.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSContactsUsageDescription 'RunConnect a besoin d'\''accéder à vos contacts pour trouver vos amis qui utilisent l'\''application et les inviter à rejoindre vos sessions.'" "$INFO_PLIST"
          
          # Photo Library (lecture)
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'RunConnect a besoin d'\''accéder à vos photos pour définir votre photo de profil.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'RunConnect a besoin d'\''accéder à vos photos pour définir votre photo de profil.'" "$INFO_PLIST"
          
          # Photo Library (écriture)
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'RunConnect a besoin d'\''accéder à vos photos pour enregistrer des images.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'RunConnect a besoin d'\''accéder à vos photos pour enregistrer des images.'" "$INFO_PLIST"
          
          # Location (en utilisation)
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'RunConnect a besoin d'\''accéder à votre position pour afficher les sessions à proximité et enregistrer vos parcours.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'RunConnect a besoin d'\''accéder à votre position pour afficher les sessions à proximité et enregistrer vos parcours.'" "$INFO_PLIST"
          
          # Location (toujours)
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'RunConnect a besoin d'\''accéder à votre position en arrière-plan pour suivre vos sessions d'\''entraînement.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'RunConnect a besoin d'\''accéder à votre position en arrière-plan pour suivre vos sessions d'\''entraînement.'" "$INFO_PLIST"
          
          # Camera
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'RunConnect a besoin d'\''accéder à la caméra pour prendre des photos de profil.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'RunConnect a besoin d'\''accéder à la caméra pour prendre des photos de profil.'" "$INFO_PLIST"
          
          # Microphone
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'RunConnect peut avoir besoin du microphone pour enregistrer des messages audio.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'RunConnect peut avoir besoin du microphone pour enregistrer des messages audio.'" "$INFO_PLIST"
          
          # User Tracking (requis si AdMob/tracking activé)
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string 'RunConnect utilise le suivi pour améliorer votre expérience et afficher des publicités pertinentes.'" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSUserTrackingUsageDescription 'RunConnect utilise le suivi pour améliorer votre expérience et afficher des publicités pertinentes.'" "$INFO_PLIST"
          
          # Encryption exemption declaration (uses only standard Apple encryption: HTTPS, TLS, Firebase Auth)
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$INFO_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$INFO_PLIST"
          
          echo "✅ Info.plist permissions configured"
          echo "✅ Encryption exemption declared"
          
          # Afficher les clés pour vérification
          echo "📋 Permissions in Info.plist:"
          /usr/libexec/PlistBuddy -c "Print :NSContactsUsageDescription" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSLocationWhenInUseUsageDescription" "$INFO_PLIST"

      - name: 🔗 Configure Deep Link URL Type (runconnect://)
        run: |
          INFO_PLIST="ios/App/App/Info.plist"
          
          # Check if runconnect scheme already exists
          if plutil -p "$INFO_PLIST" | grep -q '"runconnect"'; then
            echo "✅ runconnect scheme already present"
          else
            # Check if CFBundleURLTypes key exists
            if plutil -extract CFBundleURLTypes json "$INFO_PLIST" >/dev/null 2>&1; then
              # Array exists — use PlistBuddy to append (handles any array size)
              IDX=$(/usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$INFO_PLIST" | grep -c "Dict")
              /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX dict" "$INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLName string com.ferdi.runconnect" "$INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLSchemes array" "$INFO_PLIST"
              /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:$IDX:CFBundleURLSchemes:0 string runconnect" "$INFO_PLIST"
              echo "✅ Deep link URL Type appended via PlistBuddy (index $IDX)"
            else
              # Array doesn't exist — create it with the entry directly
              plutil -insert CFBundleURLTypes \
                -json '[{"CFBundleURLName":"com.ferdi.runconnect","CFBundleURLSchemes":["runconnect"]}]' \
                "$INFO_PLIST"
              echo "✅ Deep link URL Type created via plutil"
            fi
          fi
          
          # Verify final state
          echo "📋 Final CFBundleURLTypes:"
          plutil -p "$INFO_PLIST" | grep -A5 -i "urlschemes\|runconnect\|CFBundleURL"

      - name: 🔧 Update Bundle Identifier
        run: |
          sed -i '' 's/app.lovable.[^"]*\|io\.ionic\.starter/com.ferdi.runconnect/g' \
            ios/App/App.xcodeproj/project.pbxproj

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📦 Install xcodeproj gem
        run: gem install xcodeproj

      - name: 🔐 Setup signing keychain
        id: keychain
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          echo "📋 Certificate size: $(wc -c < "$CERT_PATH") bytes"
          echo "📋 Profile size: $(wc -c < "$PROFILE_PATH") bytes"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" "$KEYCHAIN_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")

          echo "📋 Profile UUID: $PROFILE_UUID"

          if [ -z "$PROFILE_UUID" ]; then
            echo "❌ ERROR: Failed to extract UUID"
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "keychain_path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT

          echo "✅ Keychain and profile configured"

      - name: 🔧 Configure App signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.keychain.outputs.profile_uuid }}
        run: |
          cd ios/App

          echo "📋 Team ID: $APPLE_TEAM_ID"
          echo "📋 Profile UUID: $PROFILE_UUID"

          ruby << 'RUBY_SCRIPT'
          require 'xcodeproj'

          project = Xcodeproj::Project.open('App.xcodeproj')
          app_target = project.targets.find { |t| t.name == 'App' }

          unless app_target
            puts "❌ App target not found!"
            exit 1
          end

          team_id = ENV['APPLE_TEAM_ID']
          profile_uuid = ENV['PROFILE_UUID']

          app_target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['DEVELOPMENT_TEAM'] = team_id
            config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            config.build_settings['PROVISIONING_PROFILE'] = profile_uuid
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
          end

          project.save
          puts "✅ Signing + entitlements configured for App target"
          RUBY_SCRIPT

      - name: 📦 Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: 🏗️ Build iOS archive
        run: |
          set -o pipefail
          cd ios/App

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"

      - name: 🔍 Extract build errors summary
        if: always()
        run: |
          LOG="$RUNNER_TEMP/xcodebuild.log"
          if [ ! -f "$LOG" ]; then
            echo "⚠️ No xcodebuild.log found"
            exit 0
          fi

          echo "::group::🔴 Build Errors"
          grep -nE "error:|fatal error:|ARCHIVE FAILED|linker command failed" "$LOG" | tail -40 || echo "No error: lines found"
          echo "::endgroup::"

          echo "::group::⚠️ Warnings & CodeSign"
          grep -nE "warning:.*signing|CodeSign|No signing certificate|provisioning profile" "$LOG" | tail -20 || echo "None"
          echo "::endgroup::"

          echo "::group::📜 PhaseScriptExecution failures"
          grep -nE "PhaseScriptExecution|Run custom shell script" "$LOG" | tail -10 || echo "None"
          echo "::endgroup::"

          # --- GitHub Step Summary (markdown) ---
          {
            echo "## 🍎 iOS Build Diagnostic"
            echo ""
            echo "### Errors"
            echo '```'
            grep -nE "error:|fatal error:|ARCHIVE FAILED|linker command failed" "$LOG" | tail -30 || echo "No errors found"
            echo '```'
            echo ""

            # Hints
            if grep -qE "No signing certificate|provisioning profile" "$LOG"; then
              echo "💡 **Hint**: Signing/provisioning issue detected. Check certificates & profiles in secrets."
            fi
            if grep -qE "module map|SwiftCompile.*error" "$LOG"; then
              echo "💡 **Hint**: Swift compilation or module mapping error. Check pod dependencies."
            fi
            if grep -qE "PhaseScriptExecution.*failed" "$LOG"; then
              echo "💡 **Hint**: A CocoaPods/Build Phase script failed. Check Podfile or build phases."
            fi
            if grep -qE "duplicate symbol\|multiple commands produce" "$LOG"; then
              echo "💡 **Hint**: Duplicate symbol/resource conflict. Check linked frameworks."
            fi

            echo ""
            echo "### Last 20 lines of log"
            echo '```'
            tail -20 "$LOG"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✅ Diagnostic summary written to job summary"

      - name: 📋 Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log

      - name: ✅ Verify archive exists
        run: |
          if [ ! -d "$RUNNER_TEMP/App.xcarchive" ]; then
            echo "❌ App.xcarchive NOT found — build failed!"
            echo ""
            echo "=== Root cause (extracted errors) ==="
            grep -nE "error:|fatal error:" "$RUNNER_TEMP/xcodebuild.log" | tail -15 || echo "No error lines found"
            echo ""
            echo "=== Last 10 lines ==="
            tail -10 "$RUNNER_TEMP/xcodebuild.log" || true
            exit 1
          fi
          echo "✅ App.xcarchive exists"

      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.keychain.outputs.profile_uuid }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ferdi.runconnect</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ✅ AJOUT : trouver le vrai fichier IPA (pas de wildcard)
      - name: 🔍 Find IPA
        id: find_ipa
        run: |
          IPA_PATH=$(ls "$RUNNER_TEMP/export/"*.ipa | head -n 1)
          echo "Found IPA at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: 📦 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.find_ipa.outputs.ipa_path }}

      # ✅ MODIF : utiliser le chemin exact
      - name: 🚀 Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.find_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_API_KEY_P8 }}

      - name: 🧹 Cleanup
        if: always()
        run: |
          security delete-keychain "${{ steps.keychain.outputs.keychain_path }}" || true