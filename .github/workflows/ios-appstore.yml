name: Build & Upload iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (auto-increment if empty)'
        required: false
        default: ''

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build web app
        run: npm run build

      - name: 📱 Add iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: 🔧 Update Bundle Identifier
        run: |
          sed -i '' 's/app.lovable.[^"]*\|io\.ionic\.starter/com.ferdi.runconnect/g' \
            ios/App/App.xcodeproj/project.pbxproj

      - name: 💎 Setup Ruby & xcodeproj gem
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📦 Install xcodeproj gem
        run: gem install xcodeproj

      - name: 🔐 Setup signing keychain
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e

          # Installer OpenSSL 3 (supporte le flag -legacy, contrairement à LibreSSL)
          brew install openssl@3
          OPENSSL_BIN=$(brew --prefix openssl@3)/bin/openssl

          # Créer keychain temporaire
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="temp_password_$(date +%s)"
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_NAME"
          
          # Importer certificat (decode PROPRE)
          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate_original.p12

          # ✅ TEST: vérifier que le .p12 + mot de passe matchent
          $OPENSSL_BIN pkcs12 -in certificate_original.p12 -info -noout -passin pass:"$IOS_CERTIFICATE_PASSWORD"

          # 🔄 Convertir le P12 vers un format compatible macOS (legacy algorithm)
          $OPENSSL_BIN pkcs12 -in certificate_original.p12 -out certificate.pem -nodes -passin pass:"$IOS_CERTIFICATE_PASSWORD"
          $OPENSSL_BIN pkcs12 -export -in certificate.pem -out certificate.p12 -passout pass:"$IOS_CERTIFICATE_PASSWORD" -legacy
          rm certificate.pem certificate_original.p12

          # Import dans keychain
          security import certificate.p12 -k "$KEYCHAIN_NAME" \
            -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Installer provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Décoder le profil avec la méthode recommandée par GitHub
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o profile.mobileprovision
          
          # Vérifier que le fichier existe et a une taille valide
          echo "📋 Profile file size: $(wc -c < profile.mobileprovision) bytes"
          
          # Vérifier le type de fichier
          file profile.mobileprovision
          
          # Extraire l'UUID avec une méthode plus robuste
          # D'abord essayer security cms, sinon utiliser grep directement sur le binaire
          echo "📋 Extracting UUID from provisioning profile..."
          
          if security cms -D -i profile.mobileprovision > profile_decoded.plist 2>/dev/null; then
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" profile_decoded.plist)
          else
            echo "⚠️ security cms failed, trying alternative method..."
            # Méthode alternative: extraire l'UUID directement du XML embarqué
            PROFILE_UUID=$(strings profile.mobileprovision | grep -A1 '<key>UUID</key>' | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/' | head -1)
          fi
          
          echo "📋 Extracted UUID: $PROFILE_UUID"
          
          if [ -z "$PROFILE_UUID" ]; then
            echo "❌ ERROR: Failed to extract PROFILE_UUID!"
            echo "Debug: First 200 chars of profile:"
            head -c 200 profile.mobileprovision | xxd
            exit 1
          fi
          
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "✅ PROFILE_UUID saved to GITHUB_ENV: $PROFILE_UUID"
          
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          
          echo "✅ Profile installed at: ~/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: 🔧 Configure App signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          
          echo "Using Profile UUID: $PROFILE_UUID"
          echo "Using Team ID: $APPLE_TEAM_ID"
          
          # Vérifier que PROFILE_UUID est défini
          if [ -z "$PROFILE_UUID" ]; then
            echo "❌ ERROR: PROFILE_UUID is empty!"
            exit 1
          fi
          
          ruby << RUBY_SCRIPT
          require 'xcodeproj'
          
          project_path = 'App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          app_target = project.targets.find { |t| t.name == 'App' }
          
          profile_uuid = ENV['PROFILE_UUID']
          team_id = ENV['APPLE_TEAM_ID']
          
          puts "Team ID: #{team_id}"
          puts "Profile UUID: #{profile_uuid}"
          
          if app_target
            app_target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['DEVELOPMENT_TEAM'] = team_id
              config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
              config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
              # Utiliser l'UUID du profil au lieu du nom
              config.build_settings['PROVISIONING_PROFILE'] = profile_uuid
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
            end
            
            project.save
            puts "✅ Signing configured for App target with UUID: #{profile_uuid}"
          else
            puts "❌ App target not found!"
            exit 1
          end
          RUBY_SCRIPT

      - name: 🏗️ Build iOS archive
        run: |
          cd ios/App
          
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ferdi.runconnect</key>
              <string>RunConnect AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: 💎 Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📤 Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          # Décoder la clé API
          printf '%s' "$ASC_KEY_P8" | base64 --decode > AuthKey.p8
          
          gem install fastlane
          
          fastlane pilot upload \
            --api_key_path AuthKey.p8 \
            --ipa ios/App/build/ipa/App.ipa \
            --skip_waiting_for_build_processing true

      - name: 🧹 Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f certificate.p12 profile.mobileprovision AuthKey.p8
