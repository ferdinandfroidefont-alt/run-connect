name: Security checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  migration-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block service_role string in SQL migrations
        run: |
          if rg -n "service_role" supabase/migrations --glob '*.sql'; then
            echo "::error::service_role must not appear in versioned migrations — use Vault or Edge secrets."
            exit 1
          fi
          echo "OK: no service_role in migrations."
