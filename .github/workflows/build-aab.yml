name: Créer Android WebView AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Cloner le dépôt
        uses: actions/checkout@v4

      - name: ⚙️ Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ⚙️ Installer SDK Android
        uses: android-actions/setup-android@v3

      - name: 📦 Accepter les licences & installer les outils
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmdline-tools;latest"

      - name: 🛠️ Créer projet WebView Android minimal
        run: |
          set -e
          mkdir -p android-webview/app/src/main/java/app/lovable/runconnect
          mkdir -p android-webview/app/src/main/res/values

          cat > android-webview/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "RunConnect"
          include(":app")
          EOF

          cat > android-webview/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.6.0' apply false }
          EOF

          cat > android-webview/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
            namespace "app.lovable.runconnect"
            compileSdk 35

            signingConfigs {
              release {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
              debug {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
            }

            defaultConfig {
              applicationId "app.lovable.runconnect"
              minSdk 24
              targetSdk 35
              versionCode 43
              versionName "1.3"
              
              buildConfigField "String", "START_URL", "\"https://run-connect.lovable.app\""
              buildConfigField "boolean", "IS_AAB_BUILD", "true"
            }

            buildTypes {
              release {
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug {
                signingConfig signingConfigs.debug
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }

            buildFeatures {
              buildConfig true
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'androidx.core:core:1.13.1'
            implementation 'androidx.activity:activity:1.9.2'
            implementation 'androidx.webkit:webkit:1.11.0'
          }
          EOF

          # 🎯 Créer gradle-wrapper.properties avec la bonne version
          mkdir -p android-webview/gradle/wrapper
          cat > android-webview/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ✅ Copier le AndroidManifest.xml et MainActivity.java réels
          cp android/app/src/main/AndroidManifest.xml android-webview/app/src/main/AndroidManifest.xml
          cp android/app/src/main/java/app/lovable/runconnect/MainActivity.java android-webview/app/src/main/java/app/lovable/runconnect/MainActivity.java

          # 🔧 Modifier START_URL dynamiquement (production)
          sed -i 's|private static final String START_URL = ".*";|private static final String START_URL = BuildConfig.START_URL;|' android-webview/app/src/main/java/app/lovable/runconnect/MainActivity.java

          # ✅ Créer styles et strings XML
          cat > android-webview/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
            <style name="Theme.RunConnect" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:statusBarColor">@android:color/transparent</item>
              <item name="android:navigationBarColor">@android:color/transparent</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
            </style>
          </resources>
          EOF

          cat > android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
            <string name="app_name">RunConnect</string>
          </resources>
          EOF

      - name: 🔐 Restaurer le keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks

      - name: 🔨 Build AAB (Gradle)
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "🎯 Création du wrapper gradle si manquant..."
          [ -f ./gradlew ] || ./gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew :app:bundleRelease

      - name: 📦 Télécharger l'AAB
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks