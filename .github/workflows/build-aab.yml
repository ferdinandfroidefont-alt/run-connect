nom : Créer Android WebView AAB

sur :
  workflow_dispatch :

emplois :
  construire :
    fonctionne sur : ubuntu-latest
    timeout-minutes : 45

    étapes :
      - nom : Dépôt de caisse
        utilisations : actions/checkout@v4

      - nom : Configuration Java (JDK 17)
        utilisations : actions/setup-java@v4
        avec :
          distribution : témurine
          version java : 17

      - nom : Configuration du SDK Android
        utilisations : android-actions/setup-android@v3

      - nom : Accepter les licences et installer les composants du SDK
        courir : |
          oui | sdkmanager --licences
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"
      # ───────── Générer un mini projet Android WebView ─────────
      - nom : Créer un projet Android WebView minimal
        courir : |
          ensemble -e
          mkdir -p android-webview/app/src/main/java/app/runconnect
          mkdir -p android-webview/app/src/main/res/values
          chat > ​​​​android-webview/settings.gradle <<'EOF'
          pluginManagement { référentiels { google(); mavenCentral(); gradlePluginPortal() } }
          gestion des résolutions de dépendances {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            référentiels { google(); mavenCentral() }
          }
          rootProject.name = "RunConnect"
          inclure(":app")
          EOF
          chat > ​​​​android-webview/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.4.2' apply false }
          EOF
          chat > ​​​​android-webview/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          androïde {
            espace de noms « app.runconnect »
            compileSdk 34
            configurations de signature {
              libérer {
                storeFile fichier("${rootDir}/keystore.jks")
                Système de mots de passe store.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias ​​​​System.getenv("ANDROID_KEYSTORE_ALIAS")
                Système de mots de passe keyPassword.getenv("ANDROID_KEY_PASSWORD")
              }
              déboguer {
                storeFile fichier("${rootDir}/keystore.jks")
                Système de mots de passe store.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias ​​​​System.getenv("ANDROID_KEYSTORE_ALIAS")
                Système de mots de passe keyPassword.getenv("ANDROID_KEY_PASSWORD")
              }
            }
            configuration par défaut {
              identifiant d'application « app.runconnect »
              minSdk 24
              targetSdk 34
              versionCode 40
              nom de version "1.3"
            }
            types de construction {
              libérer {
                minifyEnabled faux
                Fichiers proguard getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signatureConfig signatureConfigs.release
              }
              déboguer {
                signatureConfig signatureConfigs.debug
              }
            }
            compileOptions {
              Compatibilité sourceJavaVersion.VERSION_17
              Compatibilité cible JavaVersion.VERSION_17
            }
          }
          dépendances {
            implémentation 'androidx.appcompat:appcompat:1.7.0'
            implémentation 'com.google.android.material:material:1.12.0'
            implémentation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implémentation 'androidx.browser:browser:1.8.0' // <-- Onglets personnalisés pour Google OAuth
          }
          EOF
          chat > ​​android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          # Manifeste avec autorisations de localisation + thème
          chat > ​​android-webview/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-feature android:name="android.hardware.location.gps" android:required="false" />
            <application
              android:label="RunConnect"
              android:usesCleartextTraffic="false"
              android:theme="@style/Theme.RunConnect">
              <activité
                android:nom=".MainActivity"
                android:exporté="true"
                android:configChanges="orientation|taille de l'écran|clavier masqué"
                android:hardwareAccelerated="true">
                <filtre d'intention>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activité>
            </application>
          </manifest>
          EOF
          # Activity avec géoloc + Custom Tabs pour Google OAuth + plein écran
          chat > ​​android-webview/app/src/main/java/app/runconnect/MainActivity.java <<'EOF'
          paquet app.runconnect;
          importer android.Manifest;
          importer android.content.pm.PackageManager;
          importer android.graphics.Color;
          importer android.net.Uri;
          importer android.os.Build;
          importer android.os.Bundle;
          importer android.webkit.GeolocationPermissions;
          importer android.webkit.WebChromeClient;
          importer android.webkit.WebResourceRequest;
          importer android.webkit.WebSettings;
          importer android.webkit.WebView;
          importer android.webkit.WebViewClient;
          importer androidx.appcompat.app.AppCompatActivity;
          importer androidx.browser.customtabs.CustomTabsIntent;
          importer androidx.core.app.ActivityCompat;
          importer androidx.core.content.ContextCompat;
          importer androidx.core.view.WindowCompat;
          classe publique MainActivity étend AppCompatActivity {
              privé statique final int REQ_LOCATION = 1001 ;
              WebView privée webView;
              chaîne finale privée START_URL = "https://run-connect.lovable.app";
              @Outrepasser
              void protégé onCreate(Bundle savedInstanceState) {
                  super.onCreate(état d'instance enregistré);
                  // Bord à bord
                  WindowCompat.setDecorFitsSystemWindows(getWindow(), faux);
                  si (Build.VERSION.SDK_INT >= 21) {
                      getWindow().setStatusBarColor(Color.TRANSPARENT);
                      getWindow().setNavigationBarColor(Couleur.TRANSPARENT);
                  }
                  webView = nouvelle WebView(ceci);
                  Paramètres Web s = webView.getSettings();
                  s.setJavaScriptEnabled(vrai);
                  s.setDomStorageEnabled(vrai);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(vrai);
                  s.setAllowFileAccess(vrai);
                  s.setMediaPlaybackRequiresUserGesture(faux);
                  s.setGeolocationEnabled(vrai);
                  // Autoriser la géolocalisation sans popup bloquée
                  webView.setWebChromeClient(nouveau WebChromeClient() {
                      @Outrepasser
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback rappel) {
                          callback.invoke(origine, vrai, faux);
                      }
                  });
                  // Ouvrir Google OAuth hors WebView (disallowed_useragent)
                  webView.setWebViewClient(nouveau WebViewClient() {
                      @Outrepasser
                      public boolean shouldOverrideUrlLoading(vue WebView, demande WebResourceRequest) {
                          Uri uri = request.getUrl();
                          Chaîne hôte = uri.getHost() != null ? uri.getHost() : "";
                          Chaîne url = uri.toString();
                          si (hôte.contains("accounts.google.com") || url.contains("oauth")) {
                              Onglets CustomTabsIntent = nouveaux onglets CustomTabsIntent.Builder().build();
                              onglets.launchUrl(MainActivity.this, uri);
                              renvoie vrai ;
                          }
                          renvoie faux ; // continuer dans le WebView
                      }
                  });
                  // Localisation de l'exécution des autorisations
                  si (ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION)
                          != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(ceci,
                              nouvelle chaîne[]{Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.ACCESS_COARSE_LOCATION},
                              REQ_LOCATION);
                  }
                  webView.loadUrl(START_URL);
                  définirContentView(vue Web);
              }
              @Outrepasser
              public void onBackPressed() {
                  si (webView != null && webView.canGoBack()) webView.goBack();
                  sinon super.onBackPressed();
              }
          }
          EOF
          # Thème plein écran (barres transparentes)
          chat > ​​android-webview/app/src/main/res/values/styles.xml <<'EOF'
          <ressources>
            <style name="Theme.RunConnect" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:statusBarColor">@android:color/transparent</item>
              <item name="android:navigationBarColor">@android:color/transparent</item>
              <item name="android:windowLayoutInDisplayCutoutMode">bords courts</item>
            </style>
          </ressources>
          EOF
          # chaînes minimales
          chat > ​​android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">RunConnect</string></resources>
          EOF
      # ───────── Restaure le keystore depuis les SECRETS ─────────
      - nom : Restaurer le keystore de téléchargement
        répertoire de travail : android-webview
        env :
          ANDROID_KEYSTORE_B64 : ${{ secrets.ANDROID_KEYSTORE_B64 }}
        courir : |
          définir -euo pipefail
          écho "$ANDROID_KEYSTORE_B64" | tr -d '\r' | base64 -d > keystore.jks
          ls -l keystore.jks
      # ───────── Build du AAB ─────────
      - nom : Build AAB (Gradle)
        utilisations : gradle/gradle-build-action@v2
        env :
          MOT DE PASSE DU CLEF_ANDROID : ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MOT DE PASSE_CLÉ_ANDROID :      ${{ secrets.ANDROID_KEY_PASSWORD }}
          ALIAS_KEYSTORE_ANDROID :    ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        avec :
          version gradle  : 8.6
          répertoire-racine-de-construction : android-webview
          arguments : :app:bundleRelease

      # ───────── Artefacts ─────────
      - nom : Télécharger l'artefact AAB
        utilisations : actions/upload-artifact@v4
        avec :
          nom : runconnect-release
          chemin : |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks
          if-no-files-found : avertir
