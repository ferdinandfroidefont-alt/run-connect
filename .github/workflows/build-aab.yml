name: Créer Android WebView AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Cloner le dépôt
        uses: actions/checkout@v4

      - name: ⚙️ Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ⚙️ Installer SDK Android
        uses: android-actions/setup-android@v3

      - name: 📦 Accepter les licences & installer les outils
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmdline-tools;latest"

      - name: 🛠️ Créer projet WebView Android minimal
        run: |
          set -e
          mkdir -p android-webview/app/src/main/java/app/runconnect
          mkdir -p android-webview/app/src/main/res/values
          mkdir -p android-webview/app/src/main/res/xml
          mkdir -p android-webview/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android-webview/app/src/main/res/drawable

          cat > android-webview/settings.gradle <<'EOF'
          pluginManagement {
            repositories {
              maven { url 'https://maven.aliyun.com/repository/public' }
              maven { url 'https://maven.aliyun.com/repository/google' }
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories { 
              maven { url 'https://maven.aliyun.com/repository/public' }
              maven { url 'https://maven.aliyun.com/repository/google' }
              google()
              mavenCentral()
            }
          }
          rootProject.name = "RunConnect"
          include(":app")
          EOF

          cat > android-webview/build.gradle <<'EOF'
          buildscript {
            repositories {
              maven { url 'https://maven.aliyun.com/repository/public' }
              maven { url 'https://maven.aliyun.com/repository/google' }
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.2.1'
              classpath 'com.google.gms:google-services:4.4.0'
            }
          }

          allprojects {
            repositories {
              maven { url 'https://maven.aliyun.com/repository/public' }
              maven { url 'https://maven.aliyun.com/repository/google' }
              google()
              mavenCentral()
            }
          }

          task clean(type: Delete) {
            delete rootProject.buildDir
          }
          EOF

          cat > android-webview/app/build.gradle <<'EOF'
          plugins { 
            id 'com.android.application'
            id 'com.google.gms.google-services'
          }

          android {
            namespace "app.runconnect"
            compileSdk 35

            signingConfigs {
              release {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
              debug {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
            }

            defaultConfig {
              applicationId "app.runconnect"
              minSdk 24
              targetSdk 35
              versionCode 179
              versionName "1.5.0"
              
              buildConfigField "String", "START_URL", "\"https://run-connect.lovable.app\""
              buildConfigField "boolean", "IS_AAB_BUILD", "true"
            }

            buildTypes {
              release {
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug {
                signingConfig signingConfigs.debug
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }

            buildFeatures {
              buildConfig true
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'androidx.core:core:1.13.1'
            implementation 'androidx.activity:activity:1.9.2'
            implementation 'androidx.webkit:webkit:1.11.0'
            
            implementation platform('com.google.firebase:firebase-bom:32.7.0')
            implementation 'com.google.firebase:firebase-messaging'
            implementation 'com.google.firebase:firebase-analytics'
            
            implementation 'com.google.android.gms:play-services-auth:21.0.0'
            
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'com.capacitorjs:core:6.1.2'
          }
          EOF

          mkdir -p android-webview/gradle/wrapper
          cat > android-webview/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cp -r android/app/src/main/java/app/runconnect/* android-webview/app/src/main/java/app/runconnect/
          
          sed -i 's|private final String START_URL = System.getProperty.*|private final String START_URL = BuildConfig.START_URL;|' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          sed -i 's|private final String START_URL = ".*";|private final String START_URL = BuildConfig.START_URL;|' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          
          if grep -q "setSupportMultipleWindows" android-webview/app/src/main/java/app/runconnect/MainActivity.java; then
            echo "✅ setSupportMultipleWindows détecté"
          else
            echo "⚠️ ATTENTION: setSupportMultipleWindows manquant - ajout automatique"
            sed -i '/setDomStorageEnabled(true);/a \        s.setSupportMultipleWindows(true);' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          fi

          if grep -q "onCreateWindow" android-webview/app/src/main/java/app/runconnect/MainActivity.java; then
            echo "✅ onCreateWindow détecté"
          else
            echo "❌ ERREUR: onCreateWindow manquant dans MainActivity.java !"
            exit 1
          fi
          
          # 🎯 Android 15/16 Fix: Vérifier que setupImmersiveMode existe
          if grep -q "setupImmersiveMode" android-webview/app/src/main/java/app/runconnect/MainActivity.java; then
            echo "✅ Android 15/16 fix (setupImmersiveMode) détecté"
          else
            echo "⚠️ ATTENTION: setupImmersiveMode manquant - Android 15/16 pourrait crasher"
          fi
          
          # 🎯 Android 16 Fix: Créer le fichier values-v35/styles.xml
          echo "📁 Création du style Android 16 OptOutEdgeToEdgeEnforcement..."
          mkdir -p android-webview/app/src/main/res/values-v35
          cat > android-webview/app/src/main/res/values-v35/styles.xml << 'STYLES_V35'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="OptOutEdgeToEdgeEnforcement">
                  <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>
              </style>
          </resources>
          STYLES_V35
          echo "✅ values-v35/styles.xml créé"
          
          cp android/app/src/main/AndroidManifest.xml android-webview/app/src/main/AndroidManifest.xml

          echo "📁 Copie des ressources du splash screen..."
          
          # Copier styles.xml complet (contient SplashTheme)
          cp android/app/src/main/res/values/styles.xml android-webview/app/src/main/res/values/styles.xml
          
          # Copier colors.xml (colorPrimary, progressBarBlue, etc.)
          cp android/app/src/main/res/values/colors.xml android-webview/app/src/main/res/values/colors.xml
          
          # Copier les drawables du splash
          mkdir -p android-webview/app/src/main/res/drawable
          cp android/app/src/main/res/drawable/splash_background.xml android-webview/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/progress_bar_custom.xml android-webview/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/splash_gradient.xml android-webview/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/shimmer_progress_bar.xml android-webview/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/logo_glow.xml android-webview/app/src/main/res/drawable/
          
          # Copier les layouts du splash
          mkdir -p android-webview/app/src/main/res/layout
          cp android/app/src/main/res/layout/activity_splash.xml android-webview/app/src/main/res/layout/
          cp android/app/src/main/res/layout/activity_main.xml android-webview/app/src/main/res/layout/
          
          # Copier les animations du splash
          mkdir -p android-webview/app/src/main/res/anim
          cp android/app/src/main/res/anim/pulse_animation.xml android-webview/app/src/main/res/anim/
          cp android/app/src/main/res/anim/fade_in_text.xml android-webview/app/src/main/res/anim/
          cp android/app/src/main/res/anim/fade_in_title.xml android-webview/app/src/main/res/anim/
          cp android/app/src/main/res/anim/fade_in_progress.xml android-webview/app/src/main/res/anim/
          cp android/app/src/main/res/anim/shimmer_animation.xml android-webview/app/src/main/res/anim/
          
          echo "✅ Ressources du splash screen copiées avec succès"

          cat > android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">RunConnect</string>
            <string name="title_activity_main">RunConnect</string>
            <string name="package_name">app.runconnect</string>
            <string name="custom_url_scheme">app.runconnect</string>
            <string name="default_web_client_id">220304658307-dhf5bgbrogt9cfhj7c6l6pden8ofdmd0.apps.googleusercontent.com</string>
          </resources>
          EOF

          cat > android-webview/app/src/main/res/xml/file_paths.xml <<'EOF'
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="." />
          </paths>
          EOF

          # 📱 Copier toutes les icônes mipmap depuis les vraies icônes de l'app
          echo "📱 Copie des icônes officielles depuis mipmap..."
          mkdir -p android-webview/app/src/main/res/mipmap-mdpi
          mkdir -p android-webview/app/src/main/res/mipmap-hdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xhdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xxxhdpi

          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android-webview/app/src/main/res/mipmap-mdpi/
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png android-webview/app/src/main/res/mipmap-mdpi/
          
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android-webview/app/src/main/res/mipmap-hdpi/
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png android-webview/app/src/main/res/mipmap-hdpi/
          
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android-webview/app/src/main/res/mipmap-xhdpi/
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png android-webview/app/src/main/res/mipmap-xhdpi/
          
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android-webview/app/src/main/res/mipmap-xxhdpi/
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png android-webview/app/src/main/res/mipmap-xxhdpi/
          
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android-webview/app/src/main/res/mipmap-xxxhdpi/
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png android-webview/app/src/main/res/mipmap-xxxhdpi/
          
          echo "✅ Icônes officielles copiées avec succès"

      - name: 🔐 Restaurer le keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks

      - name: 🔍 Afficher empreintes SHA du keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "📋 Empreintes du certificat pour Firebase:"
          keytool -list -v -keystore keystore.jks -alias "$ANDROID_KEYSTORE_ALIAS" -storepass "$ANDROID_KEYSTORE_PASSWORD" | grep -E "(SHA1|SHA256)"

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: 🔨 Build AAB (Gradle)
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "🎯 Construction de l'AAB avec Gradle 8.4..."
          gradle :app:bundleRelease --no-daemon

      - name: 📦 Télécharger l'AAB
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks
