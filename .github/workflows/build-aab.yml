name: Build Android WebView AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmdline-tools;latest"

      - name: Install ImageMagick (icon resizing)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      # ───────── Crée le projet Android (Splash + perms + debug + mixed content) ─────────
      - name: Create Android WebView project
        run: |
          set -e
          mkdir -p android-webview/app/src/main/java/app/runconnect
          mkdir -p android-webview/app/src/main/res/values
          mkdir -p android-webview/app/src/main/res/xml

          cat > android-webview/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "RunConnect"
          include(":app")
          EOF

          cat > android-webview/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.4.2' apply false }
          EOF

          cat > android-webview/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
            namespace "app.runconnect"
            compileSdk 35

            signingConfigs {
              release {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
              debug {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
            }

            defaultConfig {
              applicationId "app.runconnect"
              minSdk 24
              targetSdk 35
              versionCode 15
              versionName "1.9"
            }

            buildTypes {
              release {
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug { signingConfig signingConfigs.debug }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'androidx.core:core-splashscreen:1.0.1'  // Splash officiel
          }
          EOF

          cat > android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          # AGP 8.4.2 avertit pour compileSdk=35 : on supprime le warning
          android.suppressUnsupportedCompileSdk=35
          EOF

          # Manifest : icônes, thème splash, networkSecurityConfig (mixed-content toléré)
          cat > android-webview/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.READ_CONTACTS" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <uses-feature android:name="android.hardware.location.gps" android:required="false" />

            <application
              android:label="RunConnect"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:usesCleartextTraffic="true"
              android:networkSecurityConfig="@xml/network_security_config"
              android:theme="@style/Theme.RunConnect">

              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:configChanges="orientation|screenSize|keyboardHidden"
                android:hardwareAccelerated="true"
                android:theme="@style/Theme.RunConnect.Launcher">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>

              <service android:name=".NotificationService" android:exported="false">
                <intent-filter>
                  <action android:name="com.google.firebase.MESSAGING_EVENT" />
                </intent-filter>
              </service>
            </application>
          </manifest>
          EOF

          # Network Security Config (autorise cleartext vers ton domaine si besoin)
          cat > android-webview/app/src/main/res/xml/network_security_config.xml <<'EOF'
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
                <certificates src="user" />
              </trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">run-connect.lovable.app</domain>
            </domain-config>
          </network-security-config>
          EOF

          # Styles (thème app + splash qui affiche l'icône)
          cat > android-webview/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
            <style name="Theme.RunConnect" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:statusBarColor">@android:color/transparent</item>
              <item name="android:navigationBarColor">@android:color/transparent</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
            </style>
            <style name="Theme.RunConnect.Launcher" parent="Theme.SplashScreen">
              <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>
              <item name="windowSplashScreenBackground">@android:color/white</item>
              <item name="postSplashScreenTheme">@style/Theme.RunConnect</item>
            </style>
          </resources>
          EOF

          # strings
          cat > android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">RunConnect</string></resources>
          EOF

          # MainActivity "pare-balles" (Splash, debug, Toast si crash, mixed-content, perms séparées)
          cat > android-webview/app/src/main/java/app/runconnect/MainActivity.java <<'EOF'
          package app.runconnect;

          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.util.Log;
          import android.view.Gravity;
          import android.widget.FrameLayout;
          import android.widget.Toast;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          import androidx.appcompat.app.AppCompatActivity;
          import androidx.browser.customtabs.CustomTabsIntent;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.splashscreen.SplashScreen;
          import androidx.core.view.WindowCompat;

          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends AppCompatActivity {
              private static final String TAG = "RunConnect";
              private static final int REQ_PERMS = 1001;
              private WebView webView;
              private final String START_URL = "https://run-connect.lovable.app";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  try { SplashScreen.installSplashScreen(this); } catch (Throwable ignored) {}
                  super.onCreate(savedInstanceState);

                  try {
                      WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
                      if (Build.VERSION.SDK_INT >= 21) {
                          getWindow().setStatusBarColor(Color.TRANSPARENT);
                          getWindow().setNavigationBarColor(Color.TRANSPARENT);
                      }
                  } catch (Throwable t) {
                      Log.w(TAG, "WindowCompat failed: " + t.getMessage());
                  }

                  FrameLayout root = new FrameLayout(this);
                  setContentView(root);

                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.KITKAT) {
                          WebView.setWebContentsDebuggingEnabled(true);
                      }

                      webView = new WebView(this);
                      FrameLayout.LayoutParams lp = new FrameLayout.LayoutParams(
                              FrameLayout.LayoutParams.MATCH_PARENT, FrameLayout.LayoutParams.MATCH_PARENT);
                      lp.gravity = Gravity.CENTER;
                      root.addView(webView, lp);

                      WebSettings s = webView.getSettings();
                      s.setJavaScriptEnabled(true);
                      s.setDomStorageEnabled(true);
                      s.setLoadWithOverviewMode(true);
                      s.setUseWideViewPort(true);
                      s.setAllowFileAccess(true);
                      s.setMediaPlaybackRequiresUserGesture(false);
                      s.setGeolocationEnabled(true);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                          s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                      }

                      webView.addJavascriptInterface(new NotificationBridge(this), "AndroidNotifications");
                      webView.addJavascriptInterface(new ContactsBridge(this), "AndroidContacts");

                      webView.setWebChromeClient(new WebChromeClient() {
                          @Override
                          public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                              callback.invoke(origin, true, false);
                          }
                      });

                      webView.setWebViewClient(new WebViewClient() {
                          @Override
                          public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                              Uri uri = request.getUrl();
                              String host = uri.getHost() != null ? uri.getHost() : "";
                              String url  = uri.toString();
                              if (host.contains("accounts.google.com") || url.contains("oauth")) {
                                  new CustomTabsIntent.Builder().build().launchUrl(MainActivity.this, uri);
                                  return true;
                              }
                              return false;
                          }

                          @Override
                          public void onReceivedError(WebView view, int errorCode, String description, String failingUrl) {
                              Toast.makeText(MainActivity.this, "Web error: " + description, Toast.LENGTH_LONG).show();
                              Log.e(TAG, "Web error (" + errorCode + "): " + description + " @ " + failingUrl);
                          }
                      });

                      requestMissingPermissions();
                      webView.loadUrl(START_URL);

                  } catch (Throwable t) {
                      String msg = "Crash onCreate: " + t.getClass().getSimpleName() + " - " + t.getMessage();
                      Toast.makeText(this, msg, Toast.LENGTH_LONG).show();
                      Log.e(TAG, msg, t);
                  }
              }

              private void requestMissingPermissions() {
                  List<String> missing = new ArrayList<>();
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED)
                      missing.add(Manifest.permission.ACCESS_FINE_LOCATION);
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_COARSE_LOCATION) != PackageManager.PERMISSION_GRANTED)
                      missing.add(Manifest.permission.ACCESS_COARSE_LOCATION);
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_CONTACTS) != PackageManager.PERMISSION_GRANTED)
                      missing.add(Manifest.permission.READ_CONTACTS);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED)
                      missing.add(Manifest.permission.POST_NOTIFICATIONS);

                  if (!missing.isEmpty()) {
                      ActivityCompat.requestPermissions(this, missing.toArray(new String[0]), REQ_PERMS);
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          # Service / Bridges (notif & contacts)
          cat > android-webview/app/src/main/java/app/runconnect/NotificationService.java <<'EOF'
          package app.runconnect;

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.os.Build;
          import androidx.core.app.NotificationCompat;

          public class NotificationService {
              private static final String CHANNEL_ID = "runconnect_notifications";
              private final NotificationManager nm;
              private final Context ctx;

              public NotificationService(Context ctx) {
                  this.ctx = ctx.getApplicationContext();
                  this.nm = (NotificationManager) this.ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel c = new NotificationChannel(CHANNEL_ID, "RunConnect", NotificationManager.IMPORTANCE_DEFAULT);
                      nm.createNotificationChannel(c);
                  }
              }

              public boolean areNotificationsEnabled() {
                  return Build.VERSION.SDK_INT < Build.VERSION_CODES.N || nm.areNotificationsEnabled();
              }

              public void show(String title, String body) {
                  NotificationCompat.Builder b = new NotificationCompat.Builder(ctx, CHANNEL_ID)
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentTitle(title).setContentText(body)
                      .setAutoCancel(true);
                  nm.notify(1, b.build());
              }
          }
          EOF

          cat > android-webview/app/src/main/java/app/runconnect/NotificationBridge.java <<'EOF'
          package app.runconnect;

          import android.content.Context;
          import android.webkit.JavascriptInterface;

          public class NotificationBridge {
              private final NotificationService service;
              public NotificationBridge(Context ctx) { this.service = new NotificationService(ctx); }

              @JavascriptInterface public boolean requestPermissions() { return service.areNotificationsEnabled(); }
              @JavascriptInterface public boolean areNotificationsSupported() { return true; }
              @JavascriptInterface public void showNotification(String t, String m) { service.show(t, m); }
          }
          EOF

          cat > android-webview/app/src/main/java/app/runconnect/ContactsBridge.java <<'EOF'
          package app.runconnect;

          import android.content.Context;
          import android.webkit.JavascriptInterface;
          import android.database.Cursor;
          import android.provider.ContactsContract;
          import android.content.pm.PackageManager;
          import androidx.core.content.ContextCompat;
          import android.Manifest;
          import org.json.JSONArray;
          import org.json.JSONObject;

          public class ContactsBridge {
              private final Context ctx;
              public ContactsBridge(Context c) { this.ctx = c; }

              @JavascriptInterface public boolean hasContactsPermission() {
                  return ContextCompat.checkSelfPermission(ctx, Manifest.permission.READ_CONTACTS) == PackageManager.PERMISSION_GRANTED;
              }
              @JavascriptInterface public boolean areContactsSupported() { return true; }

              @JavascriptInterface public String getContacts() {
                  if (!hasContactsPermission()) return "[]";
                  JSONArray out = new JSONArray();
                  Cursor c = ctx.getContentResolver().query(
                      ContactsContract.CommonDataKinds.Phone.CONTENT_URI,
                      new String[]{
                        ContactsContract.CommonDataKinds.Phone.CONTACT_ID,
                        ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME,
                        ContactsContract.CommonDataKinds.Phone.NUMBER
                      }, null, null,
                      ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME + " ASC"
                  );
                  if (c != null) {
                      while (c.moveToNext()) {
                          try {
                            JSONObject o = new JSONObject();
                            o.put("contactId", c.getString(0));
                            o.put("displayName", c.getString(1));
                            o.put("phoneNumber", c.getString(2));
                            out.put(o);
                          } catch (Exception ignored) {}
                      }
                      c.close();
                  }
                  return out.toString();
              }
          }
          EOF

      # ───────── Icônes : resize depuis assets/appicon.png ─────────
      - name: Generate launcher icons
        working-directory: android-webview
        run: |
          set -euo pipefail
          SRC="${GITHUB_WORKSPACE}/assets/appicon.png"
          if [ ! -f "$SRC" ]; then
            echo "assets/appicon.png manquant"; exit 1
          fi
          mk() { mkdir -p "app/src/main/res/$1"; }
          mk mipmap-mdpi; mk mipmap-hdpi; mk mipmap-xhdpi; mk mipmap-xxhdpi; mk mipmap-xxxhdpi; mk mipmap-anydpi-v26
          convert "$SRC" -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$SRC" -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$SRC" -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$SRC" -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$SRC" -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # round = copie simple
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png   app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png   app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp app/src/main/res/mipmap-xhdpi/ic_launcher.png  app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'XML'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/white"/>
            <foreground android:drawable="@mipmap/ic_launcher"/>
          </adaptive-icon>
          XML
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'XML'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/white"/>
            <foreground android:drawable="@mipmap/ic_launcher_round"/>
          </adaptive-icon>
          XML

      # ───────── Keystore depuis les SECRETS ─────────
      - name: Restore upload keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | tr -d '\r' | base64 -d > keystore.jks
          ls -l keystore.jks

      # ───────── Build .aab ─────────
      - name: Build AAB (Gradle)
        uses: gradle/gradle-build-action@v2
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS:   ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        with:
          gradle-version: 8.6
          build-root-directory: android-webview
          arguments: :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks
          if-no-files-found: warn
