name: Build Android App Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            $ANDROID_SDK_ROOT
          key: android-${{ runner.os }}-r34

      - name: Accept licenses & install SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Check PWA manifest reachability
        run: |
          set -e
          echo "GET https://run-connect.lovable.app/manifest.webmanifest"
          curl -I https://run-connect.lovable.app/manifest.webmanifest
          curl -fsSL https://run-connect.lovable.app/manifest.webmanifest | head -c 400 && echo

      # >>> Remplacement: init non-interactif via config JSON qui fixe le JDK <<<
      - name: Init Bubblewrap (use provided JDK, non-interactive)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          echo "{\"jdkPath\":\"$JAVA_HOME\"}" > bw-config.json
          cat bw-config.json
          bubblewrap init \
            --manifest=https://run-connect.lovable.app/manifest.webmanifest \
            --directory twa-project \
            --skipSigning \
            --config bw-config.json

      - name: Build AAB with Bubblewrap (verbose)
        working-directory: twa-project
        run: |
          set -x
          bubblewrap build --verbose
          echo "Listing outputs..."
          ls -R app/build/outputs || true
          ls -l | sed -n '1,200p'

      - name: Upload artifacts (AAB or whole project on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            twa-project/app-release-bundle.aab
            twa-project/app/build/outputs/bundle/release/app-release.aab
            twa-project/**/*
          if-no-files-found: warn
