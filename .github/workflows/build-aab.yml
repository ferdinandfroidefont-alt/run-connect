name: Build Android App Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project from your PWA manifest
  run: |
    # Répond "n" à la question du JDK pour éviter l'interactif
    printf "n\n" | bubblewrap init \
      --manifest=https://run-connect.lovable.app/manifest.webmanifest \
      --directory twa-project \
      --skipSigning

- name: Build AAB with Bubblewrap
  working-directory: twa-project
  run: bubblewrap build


- name: Upload AAB artifact
  uses: actions/upload-artifact@v4
  with:
    name: runconnect-release
    path: |
      twa-project/app-release-bundle.aab
      twa-project/app/build/outputs/bundle/release/app-release.aab


