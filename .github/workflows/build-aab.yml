name: Build Android WebView AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      # ───────── Génère un mini projet Android WebView ─────────
      - name: Create minimal Android WebView project
        run: |
          set -e
          mkdir -p android-webview/app/src/main/java/app/runconnect
          mkdir -p android-webview/app/src/main/res/values

          cat > android-webview/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "RunConnect"
          include(":app")
          EOF

          cat > android-webview/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.4.2' apply false }
          EOF

          cat > android-webview/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
            namespace "app.runconnect"
            compileSdk 34

            signingConfigs {
              release {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
              debug {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
            }

            defaultConfig {
              applicationId "app.runconnect"
              minSdk 24
              targetSdk 34
              versionCode 8
              versionName "1.6.1"
            }

            buildTypes {
              release {
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug {
                signingConfig signingConfigs.debug
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.browser:browser:1.8.0'   // Custom Tabs (Google OAuth)
          }
          EOF

          cat > android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # Manifest (icône + permissions)
          cat > android-webview/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.READ_CONTACTS" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="com.google.android.c2dm.permission.RECEIVE" />
            <uses-feature android:name="android.hardware.location.gps" android:required="false" />

            <application
              android:label="RunConnect"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:usesCleartextTraffic="false"
              android:theme="@style/Theme.RunConnect">

              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:configChanges="orientation|screenSize|keyboardHidden"
                android:hardwareAccelerated="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>

              <service android:name=".NotificationService" android:exported="false">
                <intent-filter>
                  <action android:name="com.google.firebase.MESSAGING_EVENT" />
                </intent-filter>
              </service>
            </application>
          </manifest>
          EOF

          # Activity + bridges
          cat > android-webview/app/src/main/java/app/runconnect/MainActivity.java <<'EOF'
          package app.runconnect;

          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;

          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          import androidx.appcompat.app.AppCompatActivity;
          import androidx.browser.customtabs.CustomTabsIntent;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.view.WindowCompat;

          public class MainActivity extends AppCompatActivity {
              private static final int REQ_LOCATION = 1001;
              private WebView webView;
              private final String START_URL = "https://run-connect.lovable.app";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
                  if (Build.VERSION.SDK_INT >= 21) {
                      getWindow().setStatusBarColor(Color.TRANSPARENT);
                      getWindow().setNavigationBarColor(Color.TRANSPARENT);
                  }

                  webView = new WebView(this);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  s.setAllowFileAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setGeolocationEnabled(true);

                  NotificationBridge notificationBridge = new NotificationBridge(this);
                  webView.addJavascriptInterface(notificationBridge, "AndroidNotifications");

                  ContactsBridge contactsBridge = new ContactsBridge(this);
                  webView.addJavascriptInterface(contactsBridge, "AndroidContacts");

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, true, false);
                      }
                  });

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          Uri uri = request.getUrl();
                          String host = uri.getHost() != null ? uri.getHost() : "";
                          String url = uri.toString();
                          if (host.contains("accounts.google.com") || url.contains("oauth")) {
                              CustomTabsIntent tabs = new CustomTabsIntent.Builder().build();
                              tabs.launchUrl(MainActivity.this, uri);
                              return true;
                          }
                          return false;
                      }
                  });

                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION)
                          != PackageManager.PERMISSION_GRANTED) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                          ActivityCompat.requestPermissions(this,
                                  new String[]{
                                      Manifest.permission.ACCESS_FINE_LOCATION,
                                      Manifest.permission.ACCESS_COARSE_LOCATION,
                                      Manifest.permission.POST_NOTIFICATIONS,
                                      Manifest.permission.READ_CONTACTS
                                  },
                                  REQ_LOCATION);
                      } else {
                          ActivityCompat.requestPermissions(this,
                                  new String[]{
                                      Manifest.permission.ACCESS_FINE_LOCATION,
                                      Manifest.permission.ACCESS_COARSE_LOCATION,
                                      Manifest.permission.READ_CONTACTS
                                  },
                                  REQ_LOCATION);
                      }
                  }

                  webView.loadUrl(START_URL);
                  setContentView(webView);
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          cat > android-webview/app/src/main/java/app/runconnect/NotificationService.java <<'EOF'
          package app.runconnect;

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.os.Build;
          import androidx.core.app.NotificationCompat;

          public class NotificationService {
              private static final String CHANNEL_ID = "runconnect_notifications";
              private final Context context;
              private final NotificationManager notificationManager;

              public NotificationService(Context context) {
                  this.context = context;
                  this.notificationManager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID, "RunConnect Notifications", NotificationManager.IMPORTANCE_DEFAULT);
                      channel.setDescription("Notifications pour les sessions et messages");
                      notificationManager.createNotificationChannel(channel);
                  }
              }

              public boolean areNotificationsEnabled() {
                  return Build.VERSION.SDK_INT < Build.VERSION_CODES.N || notificationManager.areNotificationsEnabled();
              }

              public void showNotification(String title, String message) {
                  NotificationCompat.Builder builder = new NotificationCompat.Builder(context, CHANNEL_ID)
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setContentTitle(title)
                      .setContentText(message)
                      .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                      .setAutoCancel(true);
                  notificationManager.notify(1, builder.build());
              }
          }
          EOF

          cat > android-webview/app/src/main/java/app/runconnect/ContactsBridge.java <<'EOF'
          package app.runconnect;

          import android.content.Context;
          import android.webkit.JavascriptInterface;
          import android.database.Cursor;
          import android.provider.ContactsContract;
          import android.content.pm.PackageManager;
          import androidx.core.content.ContextCompat;
          import android.Manifest;
          import org.json.JSONArray;
          import org.json.JSONObject;

          public class ContactsBridge {
              private final Context context;

              public ContactsBridge(Context context) {
                  this.context = context;
              }

              @JavascriptInterface
              public boolean hasContactsPermission() {
                  return ContextCompat.checkSelfPermission(context, Manifest.permission.READ_CONTACTS)
                          == PackageManager.PERMISSION_GRANTED;
              }

              @JavascriptInterface
              public boolean areContactsSupported() {
                  return true;
              }

              @JavascriptInterface
              public String getContacts() {
                  if (!hasContactsPermission()) return "[]";
                  JSONArray out = new JSONArray();
                  Cursor c = context.getContentResolver().query(
                      ContactsContract.CommonDataKinds.Phone.CONTENT_URI,
                      new String[]{
                        ContactsContract.CommonDataKinds.Phone.CONTACT_ID,
                        ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME,
                        ContactsContract.CommonDataKinds.Phone.NUMBER
                      },
                      null, null,
                      ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME + " ASC"
                  );
                  if (c != null) {
                      while (c.moveToNext()) {
                          JSONObject o = new JSONObject();
                          try {
                            o.put("contactId", c.getString(0));
                            o.put("displayName", c.getString(1));
                            o.put("phoneNumber", c.getString(2));
                            out.put(o);
                          } catch (Exception ignored) {}
                      }
                      c.close();
                  }
                  return out.toString();
              }
          }
          EOF

          cat > android-webview/app/src/main/java/app/runconnect/NotificationBridge.java <<'EOF'
          package app.runconnect;

          import android.content.Context;
          import android.webkit.JavascriptInterface;

          public class NotificationBridge {
              private final NotificationService service;

              public NotificationBridge(Context context) {
                  this.service = new NotificationService(context);
              }

              @JavascriptInterface
              public boolean requestPermissions() {
                  return service.areNotificationsEnabled();
              }

              @JavascriptInterface
              public boolean areNotificationsSupported() {
                  return true;
              }

              @JavascriptInterface
              public void showNotification(String title, String message) {
                  service.showNotification(title, message);
              }
          }
          EOF

          # Thème plein écran
          cat > android-webview/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
            <style name="Theme.RunConnect" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:statusBarColor">@android:color/transparent</item>
              <item name="android:navigationBarColor">@android:color/transparent</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
            </style>
          </resources>
          EOF

          # strings minimal
          cat > android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">RunConnect</string></resources>
          EOF

      # ───────── Icône depuis le repo (assets/appicon.png) ─────────
      - name: Add launcher icons from repo
        working-directory: android-webview
        run: |
          set -euo pipefail
          test -f ../assets/appicon.png || (echo "assets/appicon.png introuvable" && exit 1)

          for d in mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p app/src/main/res/$d
            cp ../assets/appicon.png app/src/main/res/$d/ic_launcher.png
            cp ../assets/appicon.png app/src/main/res/$d/ic_launcher_round.png
          done

          mkdir -p app/src/main/res/mipmap-anydpi-v26
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'XML'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/white"/>
            <foreground android:drawable="@mipmap/ic_launcher"/>
          </adaptive-icon>
          XML
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'XML'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/white"/>
            <foreground android:drawable="@mipmap/ic_launcher_round"/>
          </adaptive-icon>
          XML

      # ───────── Keystore (secrets existants) ─────────
      - name: Restore upload keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_B64" | tr -d '\r' | base64 -d > keystore.jks
          ls -l keystore.jks

      # ───────── Build du AAB ─────────
      - name: Build AAB (Gradle)
        uses: gradle/gradle-build-action@v2
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS:   ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        with:
          gradle-version: 8.6
          build-root-directory: android-webview
          arguments: :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks
          if-no-files-found: warn
