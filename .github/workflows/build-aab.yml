name: Créer Android WebView AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Cloner le dépôt
        uses: actions/checkout@v4

      - name: ⚙️ Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ⚙️ Installer SDK Android
        uses: android-actions/setup-android@v3

      - name: 📦 Accepter les licences & installer les outils
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmdline-tools;latest"

      - name: 🛠️ Créer projet WebView Android minimal
        run: |
          set -e
          mkdir -p android-webview/app/src/main/java/app/runconnect
          mkdir -p android-webview/app/src/main/res/values
          mkdir -p android-webview/app/src/main/res/xml
          mkdir -p android-webview/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android-webview/app/src/main/res/drawable

          cat > android-webview/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { 
              google()
              mavenCentral()
              maven { url 'https://jitpack.io' }
            }
          }
          rootProject.name = "RunConnect"
          include(":app")
          EOF

          cat > android-webview/build.gradle <<'EOF'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.6.0'
              classpath 'com.google.gms:google-services:4.4.0'
            }
          }

          plugins { id 'com.android.application' version '8.6.0' apply false }
          EOF

          cat > android-webview/app/build.gradle <<'EOF'
          plugins { 
            id 'com.android.application'
            id 'com.google.gms.google-services'
          }

          android {
            namespace "app.runconnect"
            compileSdk 35

            signingConfigs {
              release {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
              debug {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
            }

            defaultConfig {
              applicationId "app.runconnect"
              minSdk 24
              targetSdk 35
              versionCode 162
              versionName "1.5.0"
              
              buildConfigField "String", "START_URL", "\"https://run-connect.lovable.app\""
              buildConfigField "boolean", "IS_AAB_BUILD", "true"
            }

            buildTypes {
              release {
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug {
                signingConfig signingConfigs.debug
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }

            buildFeatures {
              buildConfig true
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'androidx.core:core:1.13.1'
            implementation 'androidx.activity:activity:1.9.2'
            implementation 'androidx.webkit:webkit:1.11.0'
            
            // Firebase dependencies
            implementation platform('com.google.firebase:firebase-bom:32.7.0')
            implementation 'com.google.firebase:firebase-messaging'
            implementation 'com.google.firebase:firebase-analytics'
            
            // Google Sign-In pour authentification native
            implementation 'com.google.android.gms:play-services-auth:21.0.0'
            
            // Chrome Custom Tabs pour OAuth Google sécurisé
            implementation 'androidx.browser:browser:1.8.0'
            
            // Capacitor Core (pour PermissionsPlugin) - version 6.1.2 (dernière stable de Capacitor 6)
            implementation 'com.capacitorjs:core:6.1.2'
          }
          EOF

          # 🎯 Créer gradle-wrapper.properties
          mkdir -p android-webview/gradle/wrapper
          cat > android-webview/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ✅ Copier TOUS les fichiers Java (MainActivity + PermissionsPlugin)
          cp -r android/app/src/main/java/app/runconnect/* android-webview/app/src/main/java/app/runconnect/
          
          # 🔧 Modifier START_URL dynamiquement dans le MainActivity (support des 3 formats)
          sed -i 's|private final String START_URL = System.getProperty.*|private final String START_URL = BuildConfig.START_URL;|' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          sed -i 's|private final String START_URL = ".*";|private final String START_URL = BuildConfig.START_URL;|' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          
          # 🔍 Vérifier que Custom Tabs est bien présent dans le code
          # 🔍 Vérifier que setSupportMultipleWindows est présent
          if grep -q "setSupportMultipleWindows" android-webview/app/src/main/java/app/runconnect/MainActivity.java; then
            echo "✅ setSupportMultipleWindows détecté"
          else
            echo "⚠️ ATTENTION: setSupportMultipleWindows manquant - ajout automatique"
            sed -i '/setDomStorageEnabled(true);/a \        s.setSupportMultipleWindows(true);' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          fi

          # 🔍 Vérifier que onCreateWindow est présent
          if grep -q "onCreateWindow" android-webview/app/src/main/java/app/runconnect/MainActivity.java; then
            echo "✅ onCreateWindow détecté"
          else
            echo "❌ ERREUR: onCreateWindow manquant dans MainActivity.java !"
            exit 1
          fi
          
          # ✅ Copier le VRAI AndroidManifest.xml complet (avec Firebase)
          cp android/app/src/main/AndroidManifest.xml android-webview/app/src/main/AndroidManifest.xml

          # ✅ Créer styles.xml
          cat > android-webview/app/src/main/res/values/styles.xml <<'EOF'
            <resources xmlns:tools="http://schemas.android.com/tools">
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:windowFullscreen">true</item>
                <item name="android:windowTranslucentStatus">true</item>
                <item name="android:windowTranslucentNavigation">true</item>
                <item name="android:windowLayoutInDisplayCutoutMode" tools:targetApi="o_mr1">shortEdges</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme"/>
              <style name="AppTheme.NoActionBarFull" parent="AppTheme">
                <item name="android:windowFullscreen">true</item>
              </style>
            </resources>
          EOF

          # ✅ Créer strings.xml avec Android Client ID pour Google Sign-In
          cat > android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">RunConnect</string>
            <string name="title_activity_main">RunConnect</string>
            <string name="package_name">app.runconnect</string>
            <string name="custom_url_scheme">app.runconnect</string>
            
            <!-- 🔑 Firebase Google Sign-In Android Client ID (Type 1) -->
            <string name="default_web_client_id">220304658307-dhf5bgbrogt9cfhj7c6l6pden8ofdmd0.apps.googleusercontent.com</string>
          </resources>
          EOF

          # ✅ Créer file_paths.xml
          cat > android-webview/app/src/main/res/xml/file_paths.xml <<'EOF'
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="." />
          </paths>
          EOF

          # ✅ Copier l'icône personnalisée RunConnect
          mkdir -p android-webview/app/src/main/res/mipmap-mdpi
          mkdir -p android-webview/app/src/main/res/mipmap-hdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xhdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xxxhdpi
          
          # Copier l'icône personnalisée RunConnect dans toutes les résolutions
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: 🔐 Restaurer le keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks

      - name: 🔍 Afficher empreintes SHA du keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "📋 Empreintes du certificat pour Firebase:"
          keytool -list -v -keystore keystore.jks -alias "$ANDROID_KEYSTORE_ALIAS" -storepass "$ANDROID_KEYSTORE_PASSWORD" | grep -E "(SHA1|SHA256)"

      - name: 🔨 Build AAB (Gradle)
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "🎯 Création du wrapper gradle si manquant..."
          [ -f ./gradlew ] || gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew :app:bundleRelease

      - name: 📦 Télécharger l'AAB
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks
