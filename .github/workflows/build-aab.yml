name: Build Android App Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Verify PWA manifest is reachable
        run: |
          set -e
          echo "Checking https://run-connect.lovable.app/manifest.webmanifest"
          curl -fsSL https://run-connect.lovable.app/manifest.webmanifest | head -c 200
          echo
          echo "Manifest reachable ✅"

      # >>> Pré-configurer Bubblewrap pour qu'il utilise le JDK installé (pas de prompt)
      - name: Preconfigure Bubblewrap JDK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\"}" > ~/.bubblewrap/config.json
          echo "Created ~/.bubblewrap/config.json:"
          cat ~/.bubblewrap/config.json

      # >>> Init sans interaction (Bubblewrap lit ~/.bubblewrap/config.json)
      - name: Init Bubblewrap from PWA manifest
        run: |
          bubblewrap init \
            --manifest=https://run-connect.lovable.app/manifest.webmanifest \
            --directory twa-project \
            --skipSigning

      - name: Build AAB with Bubblewrap
        working-directory: twa-project
        run: bubblewrap build

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            twa-project/app-release-bundle.aab
            twa-project/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
