name: Créer Android WebView AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Cloner le dépôt
        uses: actions/checkout@v4

      - name: ⚙️ Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ⚙️ Installer SDK Android
        uses: android-actions/setup-android@v3

      - name: 📦 Accepter les licences & installer les outils
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmdline-tools;latest"

      - name: 🛠️ Créer projet WebView Android minimal
        run: |
          set -e
          mkdir -p android-webview/app/src/main/java/app/runconnect
          mkdir -p android-webview/app/src/main/res/values
          mkdir -p android-webview/app/src/main/res/xml
          mkdir -p android-webview/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android-webview/app/src/main/res/drawable

          cat > android-webview/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "RunConnect"
          include(":app")
          EOF

          cat > android-webview/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.6.0' apply false }
          EOF

          cat > android-webview/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
            namespace "app.runconnect"
            compileSdk 35

            signingConfigs {
              release {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
              debug {
                storeFile file("${rootDir}/keystore.jks")
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEYSTORE_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
            }

            defaultConfig {
              applicationId "app.runconnect"
              minSdk 24
              targetSdk 35
              versionCode 85
              versionName "1.3"
              
              buildConfigField "String", "START_URL", "\"https://run-connect.lovable.app\""
              buildConfigField "boolean", "IS_AAB_BUILD", "true"
            }

            buildTypes {
              release {
                minifyEnabled false
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug {
                signingConfig signingConfigs.debug
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }

            buildFeatures {
              buildConfig true
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'androidx.core:core:1.13.1'
            implementation 'androidx.activity:activity:1.9.2'
            implementation 'androidx.webkit:webkit:1.11.0'
          }
          EOF

          # 🎯 Créer gradle-wrapper.properties
          mkdir -p android-webview/gradle/wrapper
          cat > android-webview/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android-webview/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ✅ Copier les fichiers Java depuis android/ (avec AndroidBridge et permissions)
          cp android/app/src/main/java/app/runconnect/MainActivity.java android-webview/app/src/main/java/app/runconnect/MainActivity.java
          
          # 🔧 Modifier START_URL dynamiquement dans le MainActivity
          sed -i 's|private final String START_URL = ".*";|private final String START_URL = BuildConfig.START_URL;|' android-webview/app/src/main/java/app/runconnect/MainActivity.java
          
          # ✅ Créer AndroidManifest simplifié (sans Firebase)
          cat > android-webview/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <!-- 📍 GÉOLOCALISATION -->
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <!-- 📷 CAMERA -->
              <uses-permission android:name="android.permission.CAMERA" />
              
              <!-- 📷 STOCKAGE - PAR VERSION ANDROID -->
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED" />

              <!-- 👥 CONTACTS -->
              <uses-permission android:name="android.permission.READ_CONTACTS" />

              <!-- 🌐 INTERNET / RÉSEAU -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <!-- 📲 COMPATIBILITÉ HARDWARE -->
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />
              <uses-feature android:name="android.hardware.location" android:required="false" />
              <uses-feature android:name="android.hardware.location.gps" android:required="false" />
              <uses-feature android:name="android.hardware.location.network" android:required="false" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="false">

                  <!-- 🧠 ACTIVITÉ PRINCIPALE -->
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:hardwareAccelerated="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:theme="@style/AppTheme.NoActionBarLaunch">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      
                      <!-- Deep Link pour OAuth callback -->
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="app.runconnect" />
                      </intent-filter>
                  </activity>

                  <!-- 🔓 FILE PROVIDER POUR ACCÈS FICHIERS -->
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

              </application>

          </manifest>
          EOF

          # ✅ Créer styles.xml
          cat > android-webview/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"/>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme"/>
              <style name="Theme.RunConnect" parent="Theme.AppCompat.Light.NoActionBar"/>
          </resources>
          EOF

          # ✅ Créer strings.xml
          cat > android-webview/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
            <string name="app_name">RunConnect</string>
          </resources>
          EOF

          # ✅ Créer file_paths.xml
          cat > android-webview/app/src/main/res/xml/file_paths.xml <<'EOF'
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="." />
          </paths>
          EOF

          # ✅ Copier l'icône personnalisée RunConnect
          mkdir -p android-webview/app/src/main/res/mipmap-mdpi
          mkdir -p android-webview/app/src/main/res/mipmap-hdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xhdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-webview/app/src/main/res/mipmap-xxxhdpi
          
          # Copier l'icône personnalisée RunConnect dans toutes les résolutions
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp assets/appicon.png android-webview/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: 🔐 Restaurer le keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks

      - name: 🔍 Afficher empreintes SHA du keystore
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "📋 Empreintes du certificat pour Firebase:"
          keytool -list -v -keystore keystore.jks -alias "$ANDROID_KEYSTORE_ALIAS" -storepass "$ANDROID_KEYSTORE_PASSWORD" | grep -E "(SHA1|SHA256)"

      - name: 🔨 Build AAB (Gradle)
        working-directory: android-webview
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        run: |
          echo "🎯 Création du wrapper gradle si manquant..."
          [ -f ./gradlew ] || gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew :app:bundleRelease

      - name: 📦 Télécharger l'AAB
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-release
          path: |
            android-webview/app/build/outputs/bundle/release/app-release.aab
            android-webview/keystore.jks
