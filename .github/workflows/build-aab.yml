name: Build Android App Bundle

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project from your PWA manifest
        run: |
          bubblewrap init \
            --manifest=https://run-connect.lovable.app/manifest.webmanifest \
            --directory twa-project \
            --skipSigning \
            --skipJava


      - name: Build AAB with Bubblewrap
        working-directory: twa-project
        run: |
          bubblewrap build
          echo "Listing possible output paths..."
          ls -R

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: runconnect-aab
          path: |
            twa-project/app-release-bundle.aab
            twa-project/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
