<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunConnect - Hors ligne</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1A1F2C 0%, #2D3748 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container { max-width: 400px; }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            margin-bottom: 32px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background: #EF4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .retry-btn {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 32px;
            background: #10B981;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>RunConnect nécessite une connexion Internet pour fonctionner. Veuillez activer vos données mobiles ou vous connecter à un réseau Wi-Fi.</p>
        <div class="status">
            <span class="pulse"></span>
            <span>Connexion perdue</span>
        </div>
        <button class="retry-btn" onclick="location.reload();">
            Réessayer
        </button>
    </div>
    
    <script>
        let retryCount = 0;
        const maxRetries = 20;
        let retryTimer = null;
        
        // Détecter le retour de la connexion et recharger automatiquement
        window.addEventListener('online', function() {
            console.log('🟢 Connexion rétablie - rechargement...');
            document.querySelector('.status span:last-child').textContent = 'Reconnexion...';
            setTimeout(() => {
                window.location.href = 'https://run-connect.lovable.app';
            }, 500);
        });
        
        // Retry avec backoff exponentiel
        function tryReconnect() {
            if (retryCount >= maxRetries) {
                document.querySelector('.status span:last-child').textContent = 'Vérifiez votre connexion';
                console.log('🔴 Max retries atteint');
                return;
            }
            
            retryCount++;
            console.log('🔄 Tentative ' + retryCount + '/' + maxRetries);
            
            fetch('https://run-connect.lovable.app/favicon.png', { 
                method: 'HEAD', 
                mode: 'no-cors',
                cache: 'no-store'
            })
            .then(() => {
                console.log('🟢 Connexion détectée - rechargement...');
                document.querySelector('.status span:last-child').textContent = 'Reconnexion...';
                window.location.href = 'https://run-connect.lovable.app';
            })
            .catch(() => {
                // Backoff exponentiel: 3s, 4s, 5s, 6s... jusqu'à max 15s
                const delay = Math.min(3000 + (retryCount * 1000), 15000);
                console.log('🔴 Toujours hors ligne, retry dans ' + (delay/1000) + 's');
                retryTimer = setTimeout(tryReconnect, delay);
            });
        }
        
        // Démarrer le retry automatique après 2s
        setTimeout(tryReconnect, 2000);
        
        // Bouton retry manuel
        document.querySelector('.retry-btn').addEventListener('click', function() {
            retryCount = 0;
            if (retryTimer) clearTimeout(retryTimer);
            document.querySelector('.status span:last-child').textContent = 'Connexion...';
            tryReconnect();
        });
    </script>
</body>
</html>
