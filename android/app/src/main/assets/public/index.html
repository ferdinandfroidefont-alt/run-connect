    <!-- Premier rendu : couleur de secours derrière le visuel de chargement ; le thème met à jour ensuite -->
    <meta name="theme-color" content="#0064D6" />
    <!-- default = barre d’état opaque claire ; le thème sombre met « black » via JS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Anti-flash thème (next-themes / runconnect-ui-theme). Anciens modes accent / Deep Blue retirés : nettoyage localStorage + data-* -->
    <script>
      (function () {
        try {
          localStorage.removeItem('runconnect-visual');
          document.documentElement.removeAttribute('data-visual');
          localStorage.removeItem('runconnect-accent');
          document.documentElement.removeAttribute('data-accent');
        } catch (e) {}
        try {
          var key = 'runconnect-ui-theme';
          var t = localStorage.getItem(key);
          var dark = false;
          if (t === 'dark') dark = true;
          else if (t === 'light') dark = false;
          else dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
      document.addEventListener('DOMContentLoaded', function () {
        try {
          if (document.documentElement.classList.contains('dark') && document.body && !document.getElementById('root')?.matches(':empty')) {
            var d = 'hsl(240 5% 11%)';
            document.documentElement.style.backgroundColor = d;
            document.body.style.backgroundColor = d;
          }
        } catch (e) {}
      });
    </script>
